<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二元一次方程组 - 初一数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%); min-height: 100vh; color: #e0e6ed; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%); border-right: 1px solid rgba(255, 200, 50, 0.2); padding: 24px; overflow-y: auto; }
        .sidebar h1 { font-size: 1.5rem; color: #ffc832; margin-bottom: 8px; }
        .sidebar .subtitle { font-size: 0.85rem; color: #8b9cb3; margin-bottom: 24px; }
        .section { margin-bottom: 24px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .section-title { font-size: 0.9rem; color: #ffc832; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #ffc832, #ff9500); border-radius: 2px; }
        .formula-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255, 200, 50, 0.15); }
        .principle-text { font-size: 0.85rem; line-height: 1.7; color: #b0bec5; }
        .principle-text strong { color: #ffc832; }
        .application-item { padding: 10px 12px; background: rgba(255, 200, 50, 0.05); border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; color: #90a4ae; border-left: 3px solid rgba(255, 200, 50, 0.3); }
        .main-content { flex: 1; padding: 24px; }
        .calc-container { background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 200, 50, 0.15); padding: 24px; margin-bottom: 20px; }
        .calc-display { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 24px; text-align: center; }
        .equation-system { font-size: 1.8rem; color: #fff; margin-bottom: 16px; font-family: 'Consolas', monospace; line-height: 2; }
        .calc-steps { text-align: left; padding: 16px; background: rgba(255,200,50,0.05); border-radius: 8px; }
        .step { padding: 8px 0; color: #b0bec5; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Consolas', monospace; }
        .step:last-child { border-bottom: none; color: #4fc3f7; font-weight: bold; }
        .step.highlight { background: rgba(255, 200, 50, 0.1); margin: 4px -8px; padding: 8px; border-radius: 4px; }
        .result-big { font-size: 3rem; color: #ffc832; font-weight: bold; margin-top: 16px; font-family: 'Consolas', monospace; }
        .method-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .method-tab { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,200,50,0.2); border-radius: 6px; cursor: pointer; color: #b0bec5; transition: all 0.3s; }
        .method-tab.active { background: rgba(255,200,50,0.2); border-color: #ffc832; color: #ffc832; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .control-group { background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .control-label { font-size: 0.85rem; color: #ffc832; margin-bottom: 10px; display: block; }
        select { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,200,50,0.3); font-size: 1rem; }
        select option { background: #1a2a4a; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; font-weight: bold; }
        .btn-secondary { background: rgba(255, 200, 50, 0.15); color: #ffc832; border: 1px solid rgba(255, 200, 50, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; padding: 12px 24px; border-radius: 8px; font-weight: bold; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>二元一次方程组</h1>
            <p class="subtitle">初一数学 · 下学期第一章</p>
            <div class="section">
                <div class="section-title">解法公式</div>
                <div class="formula-box" id="f1"></div>
            </div>
            <div class="section">
                <div class="section-title">解法选择</div>
                <p class="principle-text">
                    <strong>代入消元法：</strong><br>
                    从一个方程中解出一个未知数，代入另一个方程<br><br>
                    <strong>加减消元法：</strong><br>
                    两个方程相加或相减，消去一个未知数
                </p>
            </div>
            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">🛒 鸡兔同笼问题</div>
                <div class="application-item">📐 工程合作问题</div>
                <div class="application-item">💰 利润问题</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="method-tabs">
                <div class="method-tab active" onclick="setMethod('substitution')">代入消元法</div>
                <div class="method-tab" onclick="setMethod('elimination')">加减消元法</div>
            </div>

            <div class="calc-container">
                <div class="calc-display">
                    <div class="equation-system" id="eqSystem">
                        x + y = 5<br>
                        2x − y = 4
                    </div>
                    <div class="calc-steps" id="calcSteps">
                        <div class="step highlight">由方程①得：x = 5 − y</div>
                        <div class="step">代入方程②：2(5 − y) − y = 4</div>
                        <div class="step">去括号：10 − 2y − y = 4</div>
                        <div class="step">合并：10 − 3y = 4</div>
                        <div class="step">移项：−3y = −6</div>
                        <div class="step">系数化为1：y = 2</div>
                        <div class="step">代入：x = 5 − 2 = 3</div>
                        <div class="step">✓ 解：x = 3, y = 2</div>
                    </div>
                    <div class="result-big" id="resultBig">x = 3, y = 2</div>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-group">
                    <label class="control-label">选择例题</label>
                    <select id="exampleSelect" onchange="loadExample()">
                        <option value="0">x + y = 5, 2x − y = 4</option>
                        <option value="1">x + 2y = 7, 3x − 2y = 5</option>
                        <option value="2">2x + y = 8, x − y = 1</option>
                        <option value="3">3x + 2y = 13, x + 3y = 9</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="solve()">求解</button>
                <button class="btn btn-secondary" onclick="randomExample()">随机练习</button>
                <button class="btn btn-secondary" onclick="switchMethod()">切换方法</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const examples = [
            { eq1: 'x + y = 5', eq2: '2x − y = 4', result: 'x = 3, y = 2', steps_sub: ['由方程①得：x = 5 − y', '代入②：2(5−y) − y = 4', '去括号：10 − 2y − y = 4', '合并：10 − 3y = 4', '移项：−3y = −6', 'y = 2', 'x = 5 − 2 = 3'], steps_add: ['①+②：(x+2x) + (y−y) = 5+4', '合并：3x = 9', 'x = 3', '代入①：3 + y = 5', 'y = 2'] },
            { eq1: 'x + 2y = 7', eq2: '3x − 2y = 5', result: 'x = 3, y = 2', steps_sub: ['由①得：x = 7 − 2y', '代入②：3(7−2y) − 2y = 5', '21 − 6y − 2y = 5', '−8y = −16', 'y = 2', 'x = 7 − 4 = 3'], steps_add: ['①+②：(x+3x) + (2y−2y) = 7+5', '4x = 12', 'x = 3', '代入①：3 + 2y = 7', '2y = 4', 'y = 2'] },
            { eq1: '2x + y = 8', eq2: 'x − y = 1', result: 'x = 3, y = 2', steps_sub: ['由②得：x = 1 + y', '代入①：2(1+y) + y = 8', '2 + 2y + y = 8', '3y = 6', 'y = 2', 'x = 3'], steps_add: ['①+②：(2x+x) + (y−y) = 8+1', '3x = 9', 'x = 3', '代入②：3 − y = 1', 'y = 2'] },
            { eq1: '3x + 2y = 16', eq2: 'x + y = 6', result: 'x = 4, y = 2', steps_sub: ['由②得：x = 6 − y', '代入①：3(6−y) + 2y = 16', '18 − 3y + 2y = 16', '−y = −2', 'y = 2', 'x = 6 − 2 = 4'], steps_add: ['②×2：2x + 2y = 12', '①−②×2：(3x−2x) + (2y−2y) = 16−12', 'x = 4', '代入②：4 + y = 6', 'y = 2'] }
        ];

        let currentExample = 0;
        let method = 'substitution';

        function initFormulas() {
            katex.render("\\begin{cases} a_1x + b_1y = c_1 \\\\ a_2x + b_2y = c_2 \\end{cases} \\Rightarrow x = \\frac{b_2c_1 - b_1c_2}{a_1b_2 - a_2b_1}", document.getElementById('f1'));
        }

        function setMethod(m) {
            method = m;
            document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.method-tab:nth-child(${m === 'substitution' ? 1 : 2})`).classList.add('active');
            solve();
        }

        function switchMethod() {
            setMethod(method === 'substitution' ? 'elimination' : 'substitution');
            showToast('方法已切换');
        }

        function loadExample() {
            currentExample = parseInt(document.getElementById('exampleSelect').value);
            solve();
        }

        function solve() {
            const ex = examples[currentExample];
            document.getElementById('eqSystem').innerHTML = `${ex.eq1}<br>${ex.eq2}`;

            const steps = method === 'substitution' ? ex.steps_sub : ex.steps_add;
            document.getElementById('calcSteps').innerHTML = steps.map((s, i) =>
                `<div class="step ${i === 0 || i === steps.length - 1 ? 'highlight' : ''}">${s}</div>`
            ).join('');

            document.getElementById('resultBig').textContent = ex.result;
        }

        function randomExample() {
            currentExample = Math.floor(Math.random() * examples.length);
            document.getElementById('exampleSelect').value = currentExample;
            solve();
            showToast('随机练习题');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        initFormulas();
        solve();
    </script>
</body>
</html>
