<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有理数的乘除法 - 初一数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%); min-height: 100vh; color: #e0e6ed; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%); border-right: 1px solid rgba(255, 200, 50, 0.2); padding: 24px; overflow-y: auto; }
        .sidebar h1 { font-size: 1.5rem; color: #ffc832; margin-bottom: 8px; }
        .sidebar .subtitle { font-size: 0.85rem; color: #8b9cb3; margin-bottom: 24px; }
        .section { margin-bottom: 24px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .section-title { font-size: 0.9rem; color: #ffc832; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #ffc832, #ff9500); border-radius: 2px; }
        .formula-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255, 200, 50, 0.15); }
        .principle-text { font-size: 0.85rem; line-height: 1.7; color: #b0bec5; }
        .principle-text strong { color: #ffc832; }
        .application-item { padding: 10px 12px; background: rgba(255, 200, 50, 0.05); border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; color: #90a4ae; border-left: 3px solid rgba(255, 200, 50, 0.3); }
        .main-content { flex: 1; padding: 24px; }
        .calc-container { background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 200, 50, 0.15); padding: 24px; margin-bottom: 20px; }
        .calc-display { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 24px; text-align: center; }
        .calc-expression { font-size: 2rem; color: #fff; margin-bottom: 16px; font-family: 'Consolas', monospace; }
        .calc-steps { text-align: left; padding: 16px; background: rgba(255,200,50,0.05); border-radius: 8px; }
        .step { padding: 8px 0; color: #b0bec5; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .step:last-child { border-bottom: none; color: #4fc3f7; font-weight: bold; }
        .result-big { font-size: 3rem; color: #ffc832; font-weight: bold; margin-top: 16px; }
        .sign-analysis { display: flex; justify-content: center; gap: 20px; margin: 16px 0; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .sign-item { text-align: center; padding: 8px 16px; border-radius: 6px; }
        .sign-item.positive { background: rgba(79, 195, 247, 0.2); color: #4fc3f7; }
        .sign-item.negative { background: rgba(255, 82, 82, 0.2); color: #ff5252; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .control-group { background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .control-label { font-size: 0.85rem; color: #ffc832; margin-bottom: 10px; display: block; }
        .control-value { font-size: 1.2rem; color: #fff; margin-bottom: 8px; font-weight: bold; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: rgba(255, 200, 50, 0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #ffc832, #ff9500); cursor: pointer; }
        select { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,200,50,0.3); font-size: 1rem; }
        select option { background: #1a2a4a; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; font-weight: bold; }
        .btn-secondary { background: rgba(255, 200, 50, 0.15); color: #ffc832; border: 1px solid rgba(255, 200, 50, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; padding: 12px 24px; border-radius: 8px; font-weight: bold; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .rule-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .rule-table th, .rule-table td { padding: 10px; text-align: center; border: 1px solid rgba(255,200,50,0.2); font-size: 0.85rem; }
        .rule-table th { background: rgba(255,200,50,0.1); color: #ffc832; }
        .rule-table td { color: #b0bec5; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>有理数的乘除法</h1>
            <p class="subtitle">初一数学 · 第三章</p>
            <div class="section">
                <div class="section-title">乘法法则</div>
                <div class="formula-box" id="f1"></div>
                <div class="formula-box" id="f2"></div>
            </div>
            <div class="section">
                <div class="section-title">除法法则</div>
                <div class="formula-box" id="f3"></div>
                <div class="formula-box" id="f4"></div>
            </div>
            <div class="section">
                <div class="section-title">符号规律</div>
                <table class="rule-table">
                    <tr><th>乘数符号</th><th>结果符号</th></tr>
                    <tr><td>正 × 正</td><td style="color:#4fc3f7">+</td></tr>
                    <tr><td>正 × 负</td><td style="color:#ff5252">−</td></tr>
                    <tr><td>负 × 正</td><td style="color:#ff5252">−</td></tr>
                    <tr><td>负 × 负</td><td style="color:#4fc3f7">+</td></tr>
                </table>
            </div>
            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">🛒 购物：每件-20元，买3件</div>
                <div class="application-item">📐 面积：长方形长+5cm，宽+3cm → (+5)×(+3)=+15</div>
                <div class="application-item">📈 增长：每月+10%，连续3个月</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="calc-container">
                <h3 style="color:#ffc832;margin-bottom:16px;">🧮 乘除法计算</h3>
                <div class="sign-analysis" id="signAnalysis">
                    <div class="sign-item positive">a 的符号: +</div>
                    <div class="sign-item negative">b 的符号: −</div>
                    <div class="sign-item negative">结果符号: −</div>
                </div>
                <div class="calc-display">
                    <div class="calc-expression" id="calcExpr">(+6) × (−2) = ?</div>
                    <div class="calc-steps" id="calcSteps">
                        <div class="step">步骤1：确定符号：异号相乘，结果为负</div>
                        <div class="step">步骤2：计算绝对值：|6| = 6，|−2| = 2</div>
                        <div class="step">步骤3：绝对值相乘：6 × 2 = 12</div>
                        <div class="step">✓ 结果：−12</div>
                    </div>
                    <div class="result-big" id="resultBig">−12</div>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-group">
                    <label class="control-label">第一个数 a</label>
                    <div class="control-value" id="aValue">+6</div>
                    <input type="range" id="aSlider" min="-10" max="10" step="1" value="6">
                </div>
                <div class="control-group">
                    <label class="control-label">运算符</label>
                    <select id="opSelect" onchange="calculate()">
                        <option value="*">乘法 (×)</option>
                        <option value="/">除法 (÷)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">第二个数 b</label>
                    <div class="control-value" id="bValue">−2</div>
                    <input type="range" id="bSlider" min="-10" max="10" step="1" value="-2">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="calculate()">计算</button>
                <button class="btn btn-secondary" onclick="randomCalc()">随机练习</button>
                <button class="btn btn-secondary" onclick="showDivision()">除法演示</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let a = 6, b = -2, op = '*';

        function initFormulas() {
            katex.render("\\text{同号得正，异号得负}", document.getElementById('f1'));
            katex.render("|a| \\times |b| = |a \\times b|", document.getElementById('f2'));
            katex.render("a \\div b = a \\times \\frac{1}{b}", document.getElementById('f3'));
            katex.render("\\frac{a}{b} = \\frac{|a|}{|b|}", document.getElementById('f4'));
        }

        function formatNum(n) { return n >= 0 ? `+${n}` : `${n}`; }
        function formatOp(o) { return o === '*' ? '×' : '÷'; }
        function getSign(n) { return n >= 0 ? 'positive' : 'negative'; }
        function getSignText(n) { return n >= 0 ? '+' : '−'; }

        function calculate() {
            a = parseInt(document.getElementById('aSlider').value);
            b = parseInt(document.getElementById('bSlider').value);
            op = document.getElementById('opSelect').value;

            if (op === '/' && b === 0) {
                b = 1;
                document.getElementById('bSlider').value = 1;
            }

            document.getElementById('aValue').textContent = formatNum(a);
            document.getElementById('bValue').textContent = formatNum(b);

            const aSign = getSignText(a);
            const bSign = getSignText(b);

            let result, steps = [];
            let resultSign = '+';

            if (op === '*') {
                document.getElementById('calcExpr').textContent = `(${formatNum(a)}) × (${formatNum(b)}) = ?`;
                steps.push(`符号分析：(${aSign}) × (${bSign})`);

                if ((a >= 0 && b >= 0) || (a < 0 && b < 0)) {
                    resultSign = '+';
                    steps.push('同号相乘，结果为正');
                } else {
                    resultSign = '−';
                    steps.push('异号相乘，结果为负');
                }

                const absResult = Math.abs(a) * Math.abs(b);
                steps.push(`绝对值相乘：${Math.abs(a)} × ${Math.abs(b)} = ${absResult}`);
                result = a * b;
                steps.push(`✓ 结果：${resultSign}${absResult}`);
            } else {
                document.getElementById('calcExpr').textContent = `(${formatNum(a)}) ÷ (${formatNum(b)}) = ?`;
                steps.push(`符号分析：(${aSign}) ÷ (${bSign})`);

                if ((a >= 0 && b >= 0) || (a < 0 && b < 0)) {
                    resultSign = '+';
                    steps.push('同号相除，结果为正');
                } else {
                    resultSign = '−';
                    steps.push('异号相除，结果为负');
                }

                const absResult = Math.abs(a) / Math.abs(b);
                steps.push(`绝对值相除：${Math.abs(a)} ÷ ${Math.abs(b)} = ${absResult}`);
                result = a / b;
                steps.push(`✓ 结果：${resultSign}${absResult}`);
            }

            const signAnalysis = document.getElementById('signAnalysis');
            signAnalysis.innerHTML = `
                <div class="sign-item ${getSign(a)}">a 的符号: ${aSign}</div>
                <div class="sign-item ${getSign(b)}">b 的符号: ${bSign}</div>
                <div class="sign-item ${resultSign === '+' ? 'positive' : 'negative'}">结果符号: ${resultSign}</div>
            `;

            document.getElementById('calcSteps').innerHTML = steps.map((s, i) =>
                `<div class="step">${s}</div>`
            ).join('');

            const displayResult = Number.isInteger(result) ? result : result.toFixed(3);
            document.getElementById('resultBig').textContent = `${resultSign}${displayResult}`;
            document.getElementById('resultBig').style.color = resultSign === '+' ? '#ffc832' : '#ff5252';
        }

        function randomCalc() {
            a = Math.round(Math.random() * 10 - 5);
            b = Math.round(Math.random() * 10 - 5);
            if (b === 0) b = 1;
            op = Math.random() > 0.5 ? '*' : '/';
            document.getElementById('aSlider').value = a;
            document.getElementById('bSlider').value = b;
            document.getElementById('opSelect').value = op;
            calculate();
            showToast('随机练习题');
        }

        function showDivision() {
            a = 8; b = -2;
            op = '/';
            document.getElementById('aSlider').value = a;
            document.getElementById('bSlider').value = b;
            document.getElementById('opSelect').value = op;
            calculate();
            showToast('除法示例');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        document.getElementById('aSlider').addEventListener('input', calculate);
        document.getElementById('bSlider').addEventListener('input', calculate);

        initFormulas();
        calculate();
    </script>
</body>
</html>
