<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有理数的乘方 - 初一数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%); min-height: 100vh; color: #e0e6ed; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%); border-right: 1px solid rgba(255, 200, 50, 0.2); padding: 24px; overflow-y: auto; }
        .sidebar h1 { font-size: 1.5rem; color: #ffc832; margin-bottom: 8px; }
        .sidebar .subtitle { font-size: 0.85rem; color: #8b9cb3; margin-bottom: 24px; }
        .section { margin-bottom: 24px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .section-title { font-size: 0.9rem; color: #ffc832; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #ffc832, #ff9500); border-radius: 2px; }
        .formula-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255, 200, 50, 0.15); }
        .principle-text { font-size: 0.85rem; line-height: 1.7; color: #b0bec5; }
        .principle-text strong { color: #ffc832; }
        .application-item { padding: 10px 12px; background: rgba(255, 200, 50, 0.05); border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; color: #90a4ae; border-left: 3px solid rgba(255, 200, 50, 0.3); }
        .main-content { flex: 1; padding: 24px; }
        .calc-container { background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 200, 50, 0.15); padding: 24px; margin-bottom: 20px; }
        .calc-display { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 24px; text-align: center; }
        .calc-expression { font-size: 2.5rem; color: #fff; margin-bottom: 16px; font-family: 'Consolas', monospace; }
        .calc-steps { text-align: left; padding: 16px; background: rgba(255,200,50,0.05); border-radius: 8px; }
        .step { padding: 8px 0; color: #b0bec5; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Consolas', monospace; }
        .step:last-child { border-bottom: none; color: #4fc3f7; font-weight: bold; }
        .result-big { font-size: 3.5rem; color: #ffc832; font-weight: bold; margin-top: 16px; }
        .visual-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 12px; margin: 20px 0; }
        .power-item { text-align: center; padding: 12px; background: rgba(255,200,50,0.05); border-radius: 8px; border: 1px solid rgba(255,200,50,0.1); }
        .power-item .label { font-size: 0.75rem; color: #8b9cb3; }
        .power-item .value { font-size: 1.2rem; color: #ffc832; margin-top: 4px; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .control-group { background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .control-label { font-size: 0.85rem; color: #ffc832; margin-bottom: 10px; display: block; }
        .control-value { font-size: 1.2rem; color: #fff; margin-bottom: 8px; font-weight: bold; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: rgba(255, 200, 50, 0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #ffc832, #ff9500); cursor: pointer; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; font-weight: bold; }
        .btn-secondary { background: rgba(255, 200, 50, 0.15); color: #ffc832; border: 1px solid rgba(255, 200, 50, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; padding: 12px 24px; border-radius: 8px; font-weight: bold; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>有理数的乘方</h1>
            <p class="subtitle">初一数学 · 第四章</p>
            <div class="section">
                <div class="section-title">核心概念</div>
                <div class="formula-box" id="f1"></div>
                <div class="formula-box" id="f2"></div>
            </div>
            <div class="section">
                <div class="section-title">指数法则</div>
                <p class="principle-text">
                    <strong>同底数幂相乘：</strong>a^m × a^n = a^(m+n)<br><br>
                    <strong>同底数幂相除：</strong>a^m ÷ a^n = a^(m-n)<br><br>
                    <strong>幂的幂：</strong>(a^m)^n = a^(m×n)<br><br>
                    <strong>特别注意：</strong><br>
                    任何非零数的零次幂等于 1<br>
                    a^0 = 1 (a ≠ 0)
                </p>
            </div>
            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">📐 正方形面积：边长a，面积a²</div>
                <div class="application-item">📦 正方体体积：棱长a，体积a³</div>
                <div class="application-item">💰 复利计算：本金a，年利率r，n年后a(1+r)^n</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="calc-container">
                <h3 style="color:#ffc832;margin-bottom:16px;">⚡ 乘方计算</h3>
                <div class="visual-grid" id="visualGrid"></div>
                <div class="calc-display">
                    <div class="calc-expression" id="calcExpr">(−2)³ = ?</div>
                    <div class="calc-steps" id="calcSteps">
                        <div class="step">底数：−2</div>
                        <div class="step">指数：3</div>
                        <div class="step">意义： (−2) × (−2) × (−2)</div>
                        <div class="step">✓ 结果：−8</div>
                    </div>
                    <div class="result-big" id="resultBig">−8</div>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-group">
                    <label class="control-label">底数 a</label>
                    <div class="control-value" id="aValue">−2</div>
                    <input type="range" id="aSlider" min="-5" max="5" step="1" value="-2">
                </div>
                <div class="control-group">
                    <label class="control-label">指数 n</label>
                    <div class="control-value" id="nValue">3</div>
                    <input type="range" id="nSlider" min="0" max="6" step="1" value="3">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="calculate()">计算</button>
                <button class="btn btn-secondary" onclick="randomCalc()">随机练习</button>
                <button class="btn btn-secondary" onclick="showTable()">查看幂表</button>
                <button class="btn btn-secondary" onclick="showSquareCube()">完全平方/立方</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let a = -2, n = 3;

        function initFormulas() {
            katex.render("a^n = \\underbrace{a \\times a \\times \\cdots \\times a}_{n \\text{ 个 } a}", document.getElementById('f1'));
            katex.render("(-2)^3 = (-2) \\times (-2) \\times (-2) = -8", document.getElementById('f2'));
        }

        function formatNum(num) { return num >= 0 ? `+${num}` : `${num}`; }

        function calculate() {
            a = parseInt(document.getElementById('aSlider').value);
            n = parseInt(document.getElementById('nSlider').value);

            document.getElementById('aValue').textContent = formatNum(a);
            document.getElementById('nValue').textContent = n;

            const sign = a >= 0 ? '' : '(' + formatNum(a) + ')';
            const supN = '⁰¹²³⁴⁵⁶⁷⁸⁹'.charAt(n) || n;
            document.getElementById('calcExpr').textContent = `${sign}${supN} = ?`;

            let result = 1;
            const steps = [`底数：${formatNum(a)}`, `指数：${n}`];

            if (n === 0) {
                result = a !== 0 ? 1 : '无定义';
                steps.push('任何非零数的0次幂等于1');
                steps.push(`✓ 结果：${result}`);
            } else {
                const multSteps = [];
                for (let i = 0; i < n; i++) {
                    result *= a;
                    multSteps.push(formatNum(a));
                }
                steps.push(`意义：${multSteps.join(' × ')}`);
                steps.push(`✓ 结果：${formatNum(result)}`);
            }

            document.getElementById('calcSteps').innerHTML = steps.map(s => `<div class="step">${s}</div>`).join('');

            const displayResult = typeof result === 'number' ? formatNum(result) : result;
            document.getElementById('resultBig').textContent = displayResult;
            document.getElementById('resultBig').style.color = typeof result === 'number' && result >= 0 ? '#ffc832' : '#ff5252';

            updateVisualGrid();
        }

        function updateVisualGrid() {
            const grid = document.getElementById('visualGrid');
            let html = '';

            if (n <= 4) {
                for (let i = 0; i <= n; i++) {
                    let val = 1;
                    for (let j = 0; j < i; j++) val *= a;
                    const label = i === 0 ? 'a⁰' : i === 1 ? 'a¹' : i === 2 ? 'a²' : i === 3 ? 'a³' : 'a⁴';
                    html += `<div class="power-item"><div class="label">${label}</div><div class="value">${formatNum(val)}</div></div>`;
                }
            } else {
                html = `<div class="power-item"><div class="label">a</div><div class="value">${formatNum(a)}</div></div>`;
                html += `<div class="power-item"><div class="label">a²</div><div class="value">${formatNum(a*a)}</div></div>`;
                html += `<div class="power-item"><div class="label">a³</div><div class="value">${formatNum(a*a*a)}</div></div>`;
                html += `<div class="power-item"><div class="label">a⁴</div><div class="value">${formatNum(a*a*a*a)}</div></div>`;
                html += `<div class="power-item"><div class="label">...</div><div class="value">aⁿ</div></div>`;
                html += `<div class="power-item"><div class="label">aⁿ</div><div class="value">${formatNum(Math.pow(a, n))}</div></div>`;
            }

            grid.innerHTML = html;
        }

        function randomCalc() {
            a = Math.round(Math.random() * 6 - 3);
            if (a === 0) a = 2;
            n = Math.round(Math.random() * 5);
            document.getElementById('aSlider').value = a;
            document.getElementById('nSlider').value = n;
            calculate();
            showToast('随机练习题');
        }

        function showTable() {
            a = 2; n = 5;
            document.getElementById('aSlider').value = a;
            document.getElementById('nSlider').value = n;
            calculate();
            showToast('常见幂值表');
        }

        function showSquareCube() {
            a = 3; n = 2;
            document.getElementById('aSlider').value = a;
            document.getElementById('nSlider').value = n;
            calculate();
            showToast('完全平方与立方');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        document.getElementById('aSlider').addEventListener('input', calculate);
        document.getElementById('nSlider').addEventListener('input', calculate);

        initFormulas();
        calculate();
    </script>
</body>
</html>
