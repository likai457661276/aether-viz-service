<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学反应类型 | Chemical Reaction Types</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/@tailwindcss/browser/4.3.0/files/dist/index.global.js"></script>
    <style>
        @import url('https://fonts.font.im/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
            --primary-gradient-light: linear-gradient(135deg, #FBBF24 0%, #F97316 100%);
            --bg-gradient: linear-gradient(180deg, #1C1917 0%, #7C2D12 50%, #C2410C 100%);
            --bg-gradient-card: rgba(120, 53, 15, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(251, 191, 36, 0.3);
            --text-primary: #F8FAFC;
            --text-secondary: #FED7AA;
            --text-muted: #FB923C;
            --accent-amber: #FBBF24;
            --accent-orange: #F97316;
            --accent-red: #EF4444;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-primary); 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: var(--primary-gradient-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .sidebar {
            position: fixed;
            top: 70px;
            left: 20px;
            width: 320px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            z-index: 10;
            transition: transform 0.3s ease;
        }
        
        .main-content {
            position: relative;
            z-index: 5;
            margin-left: 360px;
            padding: 90px 30px 30px;
            min-height: 100vh;
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(28, 25, 23, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        
        .nav-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .control-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 340px;
            z-index: 10;
        }
        
        .quiz-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 360px;
            max-height: 400px;
            z-index: 15;
            transition: all 0.3s ease;
        }
        
        .quiz-panel.collapsed {
            width: 60px;
            max-height: 60px;
            border-radius: 30px;
        }
        
        .quiz-panel.collapsed .quiz-content {
            display: none;
        }
        
        .quiz-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }
        
        .quiz-collapsed-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 14;
            font-size: 1.5rem;
        }
        
        .quiz-panel.collapsed + .quiz-collapsed-btn {
            display: flex;
        }
        
        .reaction-btn {
            padding: 12px 20px;
            border-radius: 10px;
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: var(--accent-amber);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .reaction-btn:hover, .reaction-btn.active {
            background: var(--primary-gradient);
            color: white;
            transform: scale(1.05);
        }
        
        .formula-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(251, 191, 36, 0.1);
        }
        
        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-amber);
        }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
        
        .particle { position: absolute; border-radius: 50%; pointer-events: none; }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-amber);
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 1000;
            animation: fadeInOut 2s ease;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20%, 80% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .molecule-label {
            position: absolute;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--accent-amber);
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div>
            <h1 class="nav-title">化学反应类型</h1>
            <p style="font-size: 0.75rem; color: var(--text-muted);">Chemical Reaction Types</p>
        </div>
        <div class="flex gap-3">
            <button onclick="resetScene()" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium">重置</button>
            <button onclick="randomExperiment()" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium">随机实验</button>
        </div>
    </nav>
    
    <div id="canvas-container"></div>
    
    <aside class="sidebar glass p-6">
        <h2 style="font-size: 1.1rem; color: var(--accent-amber); margin-bottom: 15px;">学习目标</h2>
        <div class="checklist-item">
            <input type="checkbox" id="obj1">
            <label for="obj1">理解四种基本反应类型</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="obj2">
            <label for="obj2">掌握化学反应方程式配平</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="obj3">
            <label for="obj3">区分氧化反应与还原反应</label>
        </div>
        
        <div style="margin-top: 25px;">
            <h2 style="font-size: 1.1rem; color: var(--accent-amber); margin-bottom: 15px;">核心反应类型</h2>
            <div id="reactionInfo" style="color: var(--text-secondary); line-height: 1.8; font-size: 0.9rem;">
                点击右侧3D场景中的分子模型，了解不同类型的化学反应
            </div>
        </div>
        
        <div style="margin-top: 25px;">
            <h2 style="font-size: 1.1rem; color: var(--accent-amber); margin-bottom: 15px;">为什么重要</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem; line-height: 1.7;">
                化学反应是物质世界变化的核心。理解反应类型能帮助我们预测产物、控制反应条件、开发新材料！
            </p>
        </div>
    </aside>
    
    <main class="main-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="glass p-8 text-center" style="max-width: 600px;">
            <h2 style="font-size: 2rem; color: var(--accent-amber); margin-bottom: 15px;">化学反应类型 3D 探索</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">点击下方按钮或3D场景中的分子，观察不同类型的化学反应</p>
            <div id="reactionBtns" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                <button class="reaction-btn active" onclick="showReaction('synthesis')">化合反应</button>
                <button class="reaction-btn" onclick="showReaction('decomposition')">分解反应</button>
                <button class="reaction-btn" onclick="showReaction('replacement')">置换反应</button>
                <button class="reaction-btn" onclick="showReaction('exchange')">复分解反应</button>
            </div>
        </div>
    </main>
    
    <div class="control-panel glass p-5">
        <h3 style="color: var(--accent-amber); margin-bottom: 15px; font-size: 1rem;">反应速率控制</h3>
        <div style="margin-bottom: 15px;">
            <label style="color: var(--text-secondary); font-size: 0.85rem;">反应温度</label>
            <input type="range" id="tempSlider" min="0" max="100" value="50" 
                   style="width: 100%; accent-color: var(--accent-amber);" onchange="updateReaction()">
            <span id="tempValue" style="color: var(--accent-amber); font-size: 0.85rem;">50°C</span>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="color: var(--text-secondary); font-size: 0.85rem;">反应进度</label>
            <input type="range" id="progressSlider" min="0" max="100" value="0" 
                   style="width: 100%; accent-color: var(--accent-orange);" onchange="updateReaction()">
            <span id="progressValue" style="color: var(--accent-orange); font-size: 0.85rem;">0%</span>
        </div>
        <button onclick="animateReaction()" class="btn-primary w-full py-3 rounded-lg font-medium">播放反应动画</button>
    </div>
    
    <div class="quiz-panel glass p-5">
        <div class="quiz-toggle" onclick="toggleQuiz()">✕</div>
        <div class="quiz-content">
            <h3 style="color: var(--accent-amber); margin-bottom: 15px;">小测验</h3>
            <div id="quizContainer">
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px;" id="quizQuestion">Zn + 2HCl → ZnCl₂ + H₂↑ 属于哪种反应类型？</p>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button class="reaction-btn" onclick="checkAnswer(0, true)">A. 化合反应</button>
                    <button class="reaction-btn" onclick="checkAnswer(0, false)">B. 分解反应</button>
                    <button class="reaction-btn" onclick="checkAnswer(0, false)">C. 置换反应</button>
                    <button class="reaction-btn" onclick="checkAnswer(0, false)">D. 复分解反应</button>
                </div>
                <p id="quizFeedback" style="margin-top: 15px; font-size: 0.85rem;"></p>
            </div>
        </div>
    </div>
    <div class="quiz-collapsed-btn" onclick="toggleQuiz()">?</div>
    
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/contrib/auto-render.min.js"></script>
    <script src="https://registry.npmmirror.com/three/0.134.0/files/build/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles = [], arrows = [], labels = [];
        let currentReaction = 'synthesis';
        let isAnimating = false;
        let clock = new THREE.Clock();
        
        const reactions = {
            synthesis: {
                title: '化合反应',
                formula: 'A + B → AB',
                description: '两种或多种物质生成一种新物质的反应。<br><br>示例：<br>• 2H₂ + O₂ → 2H₂O（氢气燃烧）<br>• Fe + S → FeS（铁与硫反应）<br><br>特点：多变一',
                equation: '2H_2 + O_2 \\rightarrow 2H_2O'
            },
            decomposition: {
                title: '分解反应',
                formula: 'AB → A + B',
                description: '一种物质生成两种或多种新物质的反应。<br><br>示例：<br>• 2H₂O → 2H₂ + O₂（水通电分解）<br>• CaCO₃ → CaO + CO₂↑（碳酸钙加热）<br><br>特点：一变多',
                equation: '2H_2O \\xrightarrow{通电} 2H_2 + O_2'
            },
            replacement: {
                title: '置换反应',
                formula: 'A + BC → AC + B',
                description: '一种单质与一种化合物反应，生成另一种单质和化合物的反应。<br><br>示例：<br>• Zn + 2HCl → ZnCl₂ + H₂↑<br>• Fe + CuSO₄ → FeSO₄ + Cu<br><br>特点：单换单',
                equation: 'Zn + 2HCl \\rightarrow ZnCl_2 + H_2\\uparrow'
            },
            exchange: {
                title: '复分解反应',
                formula: 'AB + CD → AD + CB',
                description: '两种化合物互相交换成分，生成两种新化合物的反应。<br><br>示例：<br>• HCl + NaOH → NaCl + H₂O<br>• Na₂CO₃ + Ca(OH)₂ → CaCO₃↓ + 2NaOH<br><br>特点：互相交换，化合价不变',
                equation: 'HCl + NaOH \\rightarrow NaCl + H_2O'
            }
        };
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 15);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);
            
            createReactionScene();
            animate();
            
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('click', onMouseClick);
        }
        
        function createReactionScene() {
            clearScene();
            
            const colors = {
                synthesis: { a: 0xFBBF24, b: 0xEF4444, ab: 0xF97316 },
                decomposition: { ab: 0xF97316, a: 0xFBBF24, b: 0xEF4444 },
                replacement: { a: 0x3B82F6, bc: 0x22C55E, ac: 0x8B5CF6, b: 0xEF4444 },
                exchange: { ab: 0xFBBF24, cd: 0x3B82F6, ad: 0x22C55E, cb: 0x8B5CF6 }
            };
            
            const c = colors[currentReaction];
            
            if (currentReaction === 'synthesis') {
                createMolecule(-5, 0, 0, 0xFBBF24, 'H');
                createMolecule(-3.5, 0, 0, 0xEF4444, 'H');
                createArrow(-2, 0, 0, 0xffffff, '→');
                createMolecule(0, 0, 0, 0xF97316, 'H₂');
                createLabel(0, -1.5, 'H + H → H₂');
            } else if (currentReaction === 'decomposition') {
                createMolecule(0, 0, 0, 0xF97316, 'H₂O');
                createArrow(-2.5, 0, 0, 0xffffff, '→');
                createMolecule(-5, 1, 0, 0xFBBF24, 'H');
                createMolecule(-5, -1, 0, 0xEF4444, 'H');
                createLabel(-3, -2, '2H₂O → 2H₂ + O₂');
            } else if (currentReaction === 'replacement') {
                createMolecule(-5, 0, 0, 0x3B82F6, 'Zn');
                createMolecule(-2.5, 0, 0, 0x22C55E, 'HCl');
                createArrow(-0.5, 0, 0, 0xffffff, '→');
                createMolecule(2, 0, 0, 0x8B5CF6, 'ZnCl₂');
                createMolecule(5, 0, 0, 0xEF4444, 'H₂');
                createLabel(0, -2, 'Zn + 2HCl → ZnCl₂ + H₂↑');
            } else if (currentReaction === 'exchange') {
                createMolecule(-5, 0.8, 0, 0xFBBF24, 'HCl');
                createMolecule(-5, -0.8, 0, 0x3B82F6, 'NaOH');
                createArrow(-1, 0, 0, 0xffffff, '→');
                createMolecule(2, 0.8, 0, 0x22C55E, 'NaCl');
                createMolecule(2, -0.8, 0, 0x8B5CF6, 'H₂O');
                createLabel(0, -2, 'HCl + NaOH → NaCl + H₂O');
            }
        }
        
        function createMolecule(x, y, z, color, label) {
            const geometry = new THREE.SphereGeometry(0.6, 32, 32);
            const material = new THREE.MeshPhongMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 0.3,
                shininess: 100 
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.set(x, y, z);
            sphere.userData = { type: 'molecule', label: label };
            scene.add(sphere);
            particles.push(sphere);
            
            const glowGeometry = new THREE.SphereGeometry(0.8, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.2 
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            glow.position.set(x, y, z);
            scene.add(glow);
            particles.push(glow);
        }
        
        function createArrow(x, y, z, color, text) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.set(x, y, z);
            sprite.scale.set(3, 1.5, 1);
            scene.add(sprite);
            arrows.push(sprite);
        }
        
        function createLabel(x, y, text) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.roundRect(0, 0, 512, 64, 10);
            ctx.fill();
            ctx.fillStyle = '#FBBF24';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.set(x, y, 0);
            sprite.scale.set(8, 1, 1);
            scene.add(sprite);
            labels.push(sprite);
        }
        
        function clearScene() {
            particles.forEach(p => scene.remove(p));
            arrows.forEach(a => scene.remove(a));
            labels.forEach(l => scene.remove(l));
            particles = [];
            arrows = [];
            labels = [];
        }
        
        function showReaction(type) {
            currentReaction = type;
            document.querySelectorAll('.reaction-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const info = reactions[type];
            document.getElementById('reactionInfo').innerHTML = `
                <div class="formula-box">
                    <div style="color: var(--accent-amber); font-size: 1.1rem; margin-bottom: 8px;">${info.title}</div>
                    <div style="font-size: 1.2rem; color: white;">${info.formula}</div>
                </div>
                <div style="margin-top: 10px;">${info.description}</div>
            `;
            renderMath(info.equation);
            createReactionScene();
            showToast(`${info.title} - ${info.formula}`);
        }
        
        function renderMath(equation) {
            renderMathInElement(document.getElementById('reactionInfo'), {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ]
            });
        }
        
        function updateReaction() {
            const temp = document.getElementById('tempSlider').value;
            const progress = document.getElementById('progressSlider').value;
            document.getElementById('tempValue').textContent = temp + '°C';
            document.getElementById('progressValue').textContent = progress + '%';
            
            particles.forEach((p, i) => {
                if (p.userData.type === 'molecule') {
                    const scale = 1 + (progress / 200);
                    p.scale.set(scale, scale, scale);
                }
            });
        }
        
        function animateReaction() {
            if (isAnimating) return;
            isAnimating = true;
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 2;
                document.getElementById('progressSlider').value = progress;
                updateReaction();
                
                if (progress >= 100) {
                    clearInterval(interval);
                    isAnimating = false;
                    showToast('反应完成！');
                }
            }, 50);
        }
        
        function resetScene() {
            document.getElementById('tempSlider').value = 50;
            document.getElementById('progressSlider').value = 0;
            updateReaction();
            createReactionScene();
            showToast('场景已重置');
        }
        
        function randomExperiment() {
            const types = ['synthesis', 'decomposition', 'replacement', 'exchange'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            const btn = document.querySelector(`.reaction-btn[onclick="showReaction('${randomType}')"]`);
            if (btn) btn.click();
            showToast('随机选择一个化学反应！');
        }
        
        function toggleQuiz() {
            const panel = document.querySelector('.quiz-panel');
            panel.classList.toggle('collapsed');
        }
        
        function checkAnswer(idx, correct) {
            const feedback = document.getElementById('quizFeedback');
            if (correct) {
                feedback.innerHTML = '<span style="color: #22C55E;">✓ 回答正确！置换反应是单质换单质。</span>';
                document.getElementById(`obj${idx + 1}`).checked = true;
            } else {
                feedback.innerHTML = '<span style="color: #EF4444;">✗ 回答错误，再想想。</span>';
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function onMouseClick(event) {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(particles.filter(p => p.userData.type === 'molecule'));
            if (intersects.length > 0) {
                const obj = intersects[0].object;
                showToast(`分子: ${obj.userData.label}`);
            }
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            particles.forEach((p, i) => {
                if (p.userData.type === 'molecule') {
                    p.position.y += Math.sin(time * 2 + i) * 0.002;
                }
            });
            
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
