<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燃烧与灭火 | Combustion & Fire Safety</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/@tailwindcss/browser/4.3.0/files/dist/index.global.js"></script>
    <style>
        @import url('https://fonts.font.im/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
            --bg-gradient: linear-gradient(180deg, #1C1917 0%, #7C2D12 50%, #C2410C 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(251, 191, 36, 0.3);
            --text-primary: #F8FAFC;
            --text-secondary: #FED7AA;
            --accent-amber: #FBBF24;
            --accent-red: #EF4444;
            --accent-orange: #F97316;
            --text-muted: #A8A29E;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-primary); 
            min-height: 100vh;
        }
        
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #FBBF24 0%, #F97316 100%);
            transform: translateY(-2px);
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(28, 25, 23, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        
        .nav-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sidebar {
            position: fixed;
            top: 80px;
            left: 20px;
            width: 300px;
            z-index: 10;
        }
        
        .main-content {
            position: relative;
            z-index: 5;
            margin-left: 340px;
            padding: 90px 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .control-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 320px;
            z-index: 10;
        }
        
        .quiz-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 360px;
            max-height: 400px;
            z-index: 15;
            transition: all 0.3s ease;
        }
        
        .quiz-panel.collapsed { width: 60px; max-height: 60px; border-radius: 30px; }
        .quiz-panel.collapsed .quiz-content { display: none; }
        .quiz-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .quiz-collapsed-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 14;
            font-size: 1.5rem;
        }
        
        .quiz-panel.collapsed + .quiz-collapsed-btn { display: flex; }
        
        .control-btn {
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: var(--accent-amber);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        
        .control-btn:hover, .control-btn.active {
            background: var(--primary-gradient);
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-amber);
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 1000;
            animation: fadeInOut 2s ease;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
        
        .fire-triangle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin: 15px 0;
        }
        
        .fire-element {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 20px;
            background: rgba(239,68,68,0.2);
            border-radius: 10px;
            border: 2px solid #EF4444;
        }
        
        .fire-element.active {
            background: rgba(239,68,68,0.5);
            box-shadow: 0 0 20px rgba(239,68,68,0.5);
        }
        
        .fire-element.disabled {
            opacity: 0.4;
            border-color: #666;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div>
            <h1 class="nav-title">燃烧与灭火 | Combustion & Fire</h1>
            <p style="font-size: 0.75rem; color: var(--text-muted);">探究燃烧条件与灭火原理</p>
        </div>
        <div class="flex gap-3">
            <button onclick="resetSimulation()" class="btn-primary px-4 py-2 rounded-lg text-sm">重置</button>
            <button onclick="randomScenario()" class="btn-primary px-4 py-2 rounded-lg text-sm">随机场景</button>
        </div>
    </nav>
    
    <div id="canvas-container"></div>
    
    <aside class="sidebar glass p-6">
        <h2 style="color: var(--accent-amber); margin-bottom: 15px;">学习目标</h2>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-amber);">
                <span style="font-size: 0.9rem;">掌握燃烧三要素</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-amber);">
                <span style="font-size: 0.9rem;">理解灭火原理</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-amber);">
                <span style="font-size: 0.9rem;">应用防火安全知识</span>
            </label>
        </div>
        
        <div style="margin-top: 25px;">
            <h2 style="color: var(--accent-amber); margin-bottom: 15px;">燃烧的条件</h2>
            <div class="fire-triangle">
                <div class="fire-element active" id="fireOxygen">
                    <span style="font-size: 1.5rem;">O₂</span>
                    <span style="font-size: 0.75rem;">氧气</span>
                </div>
                <div class="fire-element active" id="fireHeat">
                    <span style="font-size: 1.5rem;">🔥</span>
                    <span style="font-size: 0.75rem;">温度</span>
                </div>
                <div class="fire-element active" id="fireFuel">
                    <span style="font-size: 1.5rem;">🪵</span>
                    <span style="font-size: 0.75rem;">可燃物</span>
                </div>
            </div>
            <p style="color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; margin-top: 10px;">
                燃烧需要同时满足：<br>
                ① 可燃物 ② 氧气 ③ 达到着火点<br>
                灭火只需破坏任一条件！
            </p>
        </div>
        
        <div style="margin-top: 25px;">
            <h2 style="color: var(--accent-amber); margin-bottom: 15px;">灭火方法</h2>
            <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.85rem; color: var(--text-secondary);">
                <div style="padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px;">
                    <span style="color: var(--accent-red);">●</span> 隔离可燃物
                </div>
                <div style="padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px;">
                    <span style="color: var(--accent-orange);">●</span> 隔绝氧气
                </div>
                <div style="padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px;">
                    <span style="color: var(--accent-amber);">●</span> 降低温度至着火点以下
                </div>
            </div>
        </div>
    </aside>
    
    <main class="main-content">
        <div class="glass p-8 text-center" style="max-width: 500px;">
            <h2 style="font-size: 1.8rem; color: var(--accent-amber); margin-bottom: 15px;">燃烧3D模拟</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">点击下方按钮控制燃烧与灭火</p>
            <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
                <button class="control-btn active" onclick="startFire()" id="btnFire">🔥 点火</button>
                <button class="control-btn" onclick="addOxygen()">O₂ 增加氧气</button>
                <button class="control-btn" onclick="cutOxygen()">🚫 隔绝氧气</button>
                <button class="control-btn" onclick="pourWater()">💧 浇水降温</button>
                <button class="control-btn" onclick="removeFuel()">🪵 移走可燃物</button>
            </div>
        </div>
    </main>
    
    <div class="control-panel glass p-5">
        <h3 style="color: var(--accent-amber); margin-bottom: 15px;">环境控制</h3>
        <div style="margin-bottom: 15px;">
            <label style="color: var(--text-secondary); font-size: 0.85rem;">氧气浓度</label>
            <input type="range" id="oxygenSlider" min="0" max="100" value="21" 
                   style="width: 100%; accent-color: var(--accent-amber);" onchange="updateOxygen()">
            <span id="oxygenValue" style="color: var(--accent-amber); font-size: 0.85rem;">21%</span>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="color: var(--text-secondary); font-size: 0.85rem;">温度</label>
            <input type="range" id="tempSlider" min="0" max="100" value="20" 
                   style="width: 100%; accent-color: var(--accent-red);" onchange="updateTemp()">
            <span id="tempValue" style="color: var(--accent-red); font-size: 0.85rem;">20°C</span>
        </div>
        <div style="padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; text-align: center;">
            <span style="color: var(--text-secondary);">燃烧状态: </span>
            <span id="fireStatus" style="color: var(--accent-amber); font-weight: bold;">未燃烧</span>
        </div>
    </div>
    
    <div class="quiz-panel glass p-5">
        <div class="quiz-toggle" onclick="toggleQuiz()">✕</div>
        <div class="quiz-content">
            <h3 style="color: var(--accent-amber); margin-bottom: 15px;">小测验</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px;">灭火毯扑灭火灾的原理是？</p>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button class="control-btn" onclick="checkAnswer(false)">A. 降低温度</button>
                <button class="control-btn" onclick="checkAnswer(true)">B. 隔绝氧气</button>
                <button class="control-btn" onclick="checkAnswer(false)">C. 隔离可燃物</button>
                <button class="control-btn" onclick="checkAnswer(false)">D. 吸收热量</button>
            </div>
            <p id="quizFeedback" style="margin-top: 15px; font-size: 0.85rem;"></p>
        </div>
    </div>
    <div class="quiz-collapsed-btn" onclick="toggleQuiz()">?</div>
    
    <script src="https://registry.npmmirror.com/three/0.134.0/files/build/three.min.js"></script>
    <script>
        let scene, camera, renderer, fireParticles = [], fuelMesh, smokeParticles = [];
        let isBurning = false;
        let oxygenLevel = 21;
        let temperature = 20;
        let clock = new THREE.Clock();
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 12);
            camera.lookAt(0, 1, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);
            
            createScene();
            animate();
            
            window.addEventListener('resize', onWindowResize);
        }
        
        function createScene() {
            // 地面
            const groundGeom = new THREE.PlaneGeometry(30, 30);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeom, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            scene.add(ground);
            
            // 可燃物（木块）
            const fuelGeom = new THREE.BoxGeometry(2, 1.5, 1.5);
            const fuelMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
            fuelMesh = new THREE.Mesh(fuelGeom, fuelMat);
            fuelMesh.position.set(0, 0.25, 0);
            scene.add(fuelMesh);
            
            // 火焰容器
            createFireContainer();
        }
        
        function createFireContainer() {
            for (let i = 0; i < 50; i++) {
                const geom = new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 8, 8);
                const mat = new THREE.MeshBasicMaterial({ 
                    color: new THREE.Color().setHSL(0.05 + Math.random() * 0.08, 1, 0.5 + Math.random() * 0.3),
                    transparent: true,
                    opacity: 0
                });
                const particle = new THREE.Mesh(geom, mat);
                particle.visible = false;
                scene.add(particle);
                fireParticles.push(particle);
            }
        }
        
        function startFire() {
            if (isBurning) return;
            isBurning = true;
            oxygenLevel = 21;
            temperature = 80;
            document.getElementById('oxygenSlider').value = 21;
            document.getElementById('tempSlider').value = 80;
            updateOxygen();
            updateTemp();
            
            fireParticles.forEach(p => {
                p.visible = true;
                p.position.set(
                    (Math.random() - 0.5) * 1.5,
                    0.5 + Math.random() * 0.5,
                    (Math.random() - 0.5) * 1.5
                );
            });
            
            updateFireStatus('燃烧中');
            updateFireTriangle(true);
            showToast('火焰已点燃！');
        }
        
        function addOxygen() {
            if (!isBurning) return;
            oxygenLevel = Math.min(100, oxygenLevel + 20);
            document.getElementById('oxygenSlider').value = oxygenLevel;
            updateOxygen();
            showToast('增加氧气，火焰变旺！');
        }
        
        function cutOxygen() {
            if (!isBurning) return;
            oxygenLevel = 0;
            document.getElementById('oxygenSlider').value = 0;
            updateOxygen();
            
            if (isBurning) {
                isBurning = false;
                fireParticles.forEach(p => p.visible = false);
                updateFireStatus('已熄灭');
                updateFireTriangle(false);
                showToast('隔绝氧气，火焰熄灭！');
            }
        }
        
        function pourWater() {
            if (!isBurning) return;
            temperature = 20;
            document.getElementById('tempSlider').value = 20;
            updateTemp();
            
            if (temperature <= 30) {
                isBurning = false;
                fireParticles.forEach(p => p.visible = false);
                updateFireStatus('已熄灭');
                updateFireTriangle(false);
                showToast('浇水降温，火焰熄灭！');
            }
        }
        
        function removeFuel() {
            if (!isBurning) return;
            fuelMesh.position.y = -2;
            isBurning = false;
            fireParticles.forEach(p => p.visible = false);
            updateFireStatus('已熄灭');
            updateFireTriangle(false);
            showToast('移走可燃物，火焰熄灭！');
        }
        
        function updateOxygen() {
            oxygenLevel = parseInt(document.getElementById('oxygenSlider').value);
            document.getElementById('oxygenValue').textContent = oxygenLevel + '%';
            
            if (isBurning && oxygenLevel < 10) {
                isBurning = false;
                fireParticles.forEach(p => p.visible = false);
                updateFireStatus('氧气不足熄灭');
                updateFireTriangle(false);
            }
        }
        
        function updateTemp() {
            temperature = parseInt(document.getElementById('tempSlider').value);
            document.getElementById('tempValue').textContent = temperature + '°C';
            
            if (isBurning && temperature < 30) {
                isBurning = false;
                fireParticles.forEach(p => p.visible = false);
                updateFireStatus('温度降低熄灭');
                updateFireTriangle(false);
            }
        }
        
        function updateFireStatus(status) {
            document.getElementById('fireStatus').textContent = status;
            const statusEl = document.getElementById('fireStatus');
            if (status.includes('燃烧')) {
                statusEl.style.color = '#EF4444';
            } else {
                statusEl.style.color = '#22C55E';
            }
        }
        
        function updateFireTriangle(burning) {
            const elements = ['fireOxygen', 'fireHeat', 'fireFuel'];
            elements.forEach(id => {
                const el = document.getElementById(id);
                if (burning) {
                    el.classList.add('active');
                    el.classList.remove('disabled');
                } else {
                    el.classList.remove('active');
                }
            });
        }
        
        function resetSimulation() {
            isBurning = false;
            oxygenLevel = 21;
            temperature = 20;
            fuelMesh.position.y = 0.25;
            
            document.getElementById('oxygenSlider').value = 21;
            document.getElementById('tempSlider').value = 20;
            document.getElementById('oxygenValue').textContent = '21%';
            document.getElementById('tempValue').textContent = '20°C';
            
            fireParticles.forEach(p => {
                p.visible = false;
                p.material.opacity = 0;
            });
            
            updateFireStatus('未燃烧');
            updateFireTriangle(false);
            showToast('模拟已重置');
        }
        
        function randomScenario() {
            resetSimulation();
            setTimeout(() => {
                if (Math.random() > 0.5) {
                    startFire();
                    setTimeout(() => {
                        const actions = [addOxygen, pourWater, cutOxygen, removeFuel];
                        const action = actions[Math.floor(Math.random() * actions.length)];
                        action();
                    }, 1000);
                }
            }, 300);
        }
        
        function toggleQuiz() {
            document.querySelector('.quiz-panel').classList.toggle('collapsed');
        }
        
        function checkAnswer(correct) {
            const feedback = document.getElementById('quizFeedback');
            feedback.innerHTML = correct 
                ? '<span style="color: #22C55E;">✓ 正确！灭火毯隔绝氧气使火焰熄灭</span>'
                : '<span style="color: #EF4444;">✗ 错误，正确答案是隔绝氧气</span>';
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            
            if (isBurning) {
                fireParticles.forEach((p, i) => {
                    if (p.visible) {
                        const baseY = 0.5 + (time * 0.5 + i * 0.1) % 2;
                        p.position.y = baseY;
                        p.position.x += (Math.random() - 0.5) * 0.05;
                        p.position.z += (Math.random() - 0.5) * 0.05;
                        p.material.opacity = Math.max(0, 1 - (baseY - 0.5) / 2.5) * (oxygenLevel / 100);
                        
                        if (p.position.y > 3) {
                            p.position.set(
                                (Math.random() - 0.5) * 1.5,
                                0.5,
                                (Math.random() - 0.5) * 1.5
                            );
                        }
                    }
                });
                
                fuelMesh.material.color.setHex(0x8B4513 - Math.floor(time * 10) % 0x111111);
            }
            
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
