services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run --frozen uvicorn markdown_to_html_ppt.main:app --host 0.0.0.0 --port 10095 --reload --reload-dir markdown_to_html_ppt
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/aetherviz-service-app-venv
      UV_LINK_MODE: copy
    ports:
      - "10095:10095"
    env_file:
      - .env
    volumes:
      - .:/app

  test:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run --frozen pytest
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/aetherviz-service-test-venv
      UV_LINK_MODE: copy
    env_file:
      - .env
    volumes:
      - .:/app
