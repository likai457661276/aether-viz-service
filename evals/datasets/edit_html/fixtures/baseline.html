<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>匀速运动演示</title>
  <style>
    body{margin:0;background:#0f172a;color:#e2e8f0;font-family:sans-serif}
    #lesson{min-height:420px;padding:24px}
    #play{font-size:12px;color:#0f172a;background:#f8fafc}
    .label{color:#cbd5e1}
    #marker{fill:#38bdf8}
  </style>
</head>
<body>
  <main id="lesson" data-role="main-visual">
    <div id="play"><button id="play-animation" data-role="control">播放</button></div>
    <button id="pause-animation" data-role="control">暂停</button>
    <button id="reset-animation" data-role="control">重置</button>
    <p class="label">观察物体位置随时间均匀变化</p>
    <svg id="scene" viewBox="0 0 600 240" aria-label="匀速运动主视觉">
      <line x1="40" y1="160" x2="560" y2="160" stroke="#94a3b8"/>
      <circle id="marker" cx="80" cy="140" r="18"/>
    </svg>
  </main>
  <script id="widget-config" type="application/json">{"type":"simulation","concept":"匀速运动","defaults":{"speed":1}}</script>
  <script>
    const state={speed:1,progress:0,isPlaying:false};
    function deriveState(value){return {...value,x:80+440*value.progress}}
    function render(){const next=deriveState(state);document.querySelector('#marker').setAttribute('cx',String(next.x))}
    function play(){state.isPlaying=true;state.progress=Math.min(1,state.progress+0.2);render()}
    function pause(){state.isPlaying=false}
    function reset(){state.progress=0;state.isPlaying=false;render()}
    function setSpeed(value){state.speed=Number(value)||1}
    document.querySelector('#play-animation').addEventListener('click',play);
    document.querySelector('#pause-animation').addEventListener('click',pause);
    document.querySelector('#reset-animation').addEventListener('click',reset);
    window.addEventListener('message',event=>window.AetherVizRuntime.dispatch(event.data?.action,event.data?.payload));
    window.AetherVizRuntime={
      getState(){return {...state}},play,pause,reset,setSpeed,
      dispatch(action,payload){
        if(action==='SET_WIDGET_STATE')Object.assign(state,payload||{});
        if(action==='HIGHLIGHT_ELEMENT'||action==='ANNOTATE_ELEMENT'||action==='REVEAL_ELEMENT')render();
      }
    };
    render();window.__AETHERVIZ_RUNTIME_READY__=true;
  </script>
</body>
</html>
