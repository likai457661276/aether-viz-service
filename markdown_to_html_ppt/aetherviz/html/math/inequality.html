<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不等式与不等式组 - 初一数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%); min-height: 100vh; color: #e0e6ed; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%); border-right: 1px solid rgba(255, 200, 50, 0.2); padding: 24px; overflow-y: auto; }
        .sidebar h1 { font-size: 1.5rem; color: #ffc832; margin-bottom: 8px; }
        .sidebar .subtitle { font-size: 0.85rem; color: #8b9cb3; margin-bottom: 24px; }
        .section { margin-bottom: 24px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .section-title { font-size: 0.9rem; color: #ffc832; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #ffc832, #ff9500); border-radius: 2px; }
        .formula-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255, 200, 50, 0.15); }
        .principle-text { font-size: 0.85rem; line-height: 1.7; color: #b0bec5; }
        .principle-text strong { color: #ffc832; }
        .application-item { padding: 10px 12px; background: rgba(255, 200, 50, 0.05); border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; color: #90a4ae; border-left: 3px solid rgba(255, 200, 50, 0.3); }
        .main-content { flex: 1; padding: 24px; }
        .visual-container { background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 200, 50, 0.15); padding: 24px; margin-bottom: 20px; }
        .number-line { height: 100px; margin: 20px 0; }
        .number-line svg { width: 100%; height: 100%; }
        .calc-display { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 24px; text-align: center; margin-top: 16px; }
        .inequality-expr { font-size: 2rem; color: #fff; margin-bottom: 16px; font-family: 'Consolas', monospace; }
        .solution-result { font-size: 2.5rem; color: #ffc832; font-weight: bold; }
        .solution-range { font-size: 1.2rem; color: #4fc3f7; margin-top: 8px; }
        .result-box { background: rgba(255,200,50,0.1); padding: 12px; border-radius: 8px; margin-top: 16px; }
        .result-box h4 { color: #ffc832; margin-bottom: 8px; }
        .result-box p { color: #b0bec5; font-size: 0.9rem; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .control-group { background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .control-label { font-size: 0.85rem; color: #ffc832; margin-bottom: 10px; display: block; }
        select { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,200,50,0.3); font-size: 1rem; }
        select option { background: #1a2a4a; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: rgba(255, 200, 50, 0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #ffc832, #ff9500); cursor: pointer; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; font-weight: bold; }
        .btn-secondary { background: rgba(255, 200, 50, 0.15); color: #ffc832; border: 1px solid rgba(255, 200, 50, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; padding: 12px 24px; border-radius: 8px; font-weight: bold; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>不等式与不等式组</h1>
            <p class="subtitle">初一数学 · 下学期第二章</p>
            <div class="section">
                <div class="section-title">不等式性质</div>
                <div class="formula-box" id="f1"></div>
                <div class="formula-box" id="f2"></div>
            </div>
            <div class="section">
                <div class="section-title">解不等式步骤</div>
                <p class="principle-text">
                    <strong>1. 去分母：</strong>两边乘以正数不变向<br><br>
                    <strong>2. 去括号：</strong>注意符号变化<br><br>
                    <strong>3. 移项：</strong>变号移到另一边<br><br>
                    <strong>4. 合并同类项：</strong>系数相加减<br><br>
                    <strong>5. 系数化为1：</strong>除以正数不变向，除以负数要变向
                </p>
            </div>
            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">💰 预算约束：花费 ≤ 收入</div>
                <div class="application-item">📏 长度限制：边长 ≥ 最小值</div>
                <div class="application-item">⏰ 时间约束：完成时间 ≤ 限定时间</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="visual-container">
                <h3 style="color:#ffc832;margin-bottom:16px;">📐 不等式数轴表示</h3>
                <div class="number-line"><svg id="numberLineSvg" viewBox="0 0 700 100"></svg></div>
                <div class="calc-display">
                    <div class="inequality-expr" id="ineqExpr">2x + 3 < 11</div>
                    <div class="solution-result" id="solResult">x < 4</div>
                    <div class="solution-range" id="solRange">解集：所有小于4的数</div>
                    <div class="result-box">
                        <h4>解题步骤</h4>
                        <p id="stepsText">移项：2x < 11 − 3<br>合并：2x < 8<br>系数化为1：x < 4</p>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-group">
                    <label class="control-label">选择不等式类型</label>
                    <select id="ineqSelect" onchange="loadExample()">
                        <option value="0">2x + 3 < 11</option>
                        <option value="1">3x − 5 > 16</option>
                        <option value="2">−2x + 1 ≤ 7</option>
                        <option value="3">x + 4 ≥ 2x − 1</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="solve()">求解</button>
                <button class="btn btn-secondary" onclick="randomExample()">随机练习</button>
                <button class="btn btn-secondary" onclick="showSystem()">不等式组</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const examples = [
            { ineq: '2x + 3 < 11', solution: 'x < 4', range: '解集：所有小于4的数', steps: '移项：2x < 11 − 3\n合并：2x < 8\n系数化为1：x < 4', type: '<' },
            { ineq: '3x − 5 > 16', solution: 'x > 7', range: '解集：所有大于7的数', steps: '移项：3x > 16 + 5\n合并：3x > 21\n系数化为1：x > 7', type: '>' },
            { ineq: '−2x + 1 ≤ 7', solution: 'x ≥ −3', range: '解集：所有大于等于-3的数', steps: '移项：−2x ≤ 7 − 1\n合并：−2x ≤ 6\n系数化为1：x ≥ −3（除以负数，变向）', type: '≤' },
            { ineq: 'x + 4 ≥ 2x − 1', solution: 'x ≤ 5', range: '解集：所有小于等于5的数', steps: '移项：x − 2x ≥ −1 − 4\n合并：−x ≥ −5\n系数化为1：x ≤ 5', type: '≥' }
        ];

        let current = 0;

        function initFormulas() {
            katex.render("a > b \\Rightarrow a + c > b + c", document.getElementById('f1'));
            katex.render("a > b, c > 0 \\Rightarrow ac > bc; \\quad a > b, c < 0 \\Rightarrow ac < bc", document.getElementById('f2'));
        }

        function drawNumberLine(type, value) {
            const svg = document.getElementById('numberLineSvg');
            const width = 700;
            const centerX = width / 2;
            const scale = 40;

            let html = `<line x1="30" y1="50" x2="${width-30}" y2="50" stroke="#ffc832" stroke-width="2"/>`;

            for (let i = -5; i <= 10; i++) {
                const x = centerX + (i - 2.5) * scale;
                html += `<line x1="${x}" y1="45" x2="${x}" y2="55" stroke="#ffc832" stroke-width="1"/>`;
                html += `<text x="${x}" y="70" text-anchor="middle" fill="#8b9cb3" font-size="11">${i}</text>`;
            }

            let valueX;
            if (type === '<' || type === '≤') {
                valueX = centerX + (value - 2.5) * scale;
            } else {
                valueX = centerX + (value - 2.5) * scale;
            }

            const arrowX = type === '<' || type === '≤' ? 50 : width - 50;
            const arrowDir = type === '<' || type === '≤' ? -1 : 1;
            html += `<polygon points="${arrowX},50 ${arrowX + arrowDir * 20},40 ${arrowX + arrowDir * 20},60" fill="#ff5252"/>`;
            html += `<line x1="${type === '<' || type === '≤' ? arrowX + 20 : arrowX - 20}" y1="50" x2="${valueX}" y2="50" stroke="#ff5252" stroke-width="3"/>`;

            if (type === '<' || type === '>') {
                html += `<circle cx="${valueX}" cy="50" r="6" fill="none" stroke="#ff5252" stroke-width="2"/>`;
            } else {
                html += `<circle cx="${valueX}" cy="50" r="6" fill="#ff5252"/>`;
            }

            html += `<text x="${valueX}" y="30" text-anchor="middle" fill="#ff5252" font-size="14" font-weight="bold">${value}</text>`;

            svg.innerHTML = html;
        }

        function loadExample() {
            current = parseInt(document.getElementById('ineqSelect').value);
            solve();
        }

        function solve() {
            const ex = examples[current];
            document.getElementById('ineqExpr').textContent = ex.ineq;
            document.getElementById('solResult').textContent = ex.solution;
            document.getElementById('solRange').textContent = ex.range;
            document.getElementById('stepsText').textContent = ex.steps.replace(/\n/g, '\n');

            const value = parseInt(ex.solution.match(/-?\d+/)[0]);
            drawNumberLine(ex.type, value);
        }

        function randomExample() {
            current = Math.floor(Math.random() * examples.length);
            document.getElementById('ineqSelect').value = current;
            solve();
            showToast('随机练习题');
        }

        function showSystem() {
            document.getElementById('ineqExpr').innerHTML = '不等式组：<br>x > 2 且 x ≤ 5';
            document.getElementById('solResult').textContent = '2 < x ≤ 5';
            document.getElementById('solRange').textContent = '解集：大于2且小于等于5的数';
            document.getElementById('stepsText').textContent = '取两个不等式的交集\n第一个不等式：x > 2\n第二个不等式：x ≤ 5\n交集：2 < x ≤ 5';

            const svg = document.getElementById('numberLineSvg');
            svg.innerHTML = `
                <line x1="30" y1="50" x2="670" y2="50" stroke="#ffc832" stroke-width="2"/>
                ${[-2,-1,0,1,2,3,4,5,6,7].map((v,i) => {
                    const x = 50 + i * 70;
                    return `<line x1="${x}" y1="45" x2="${x}" y2="55" stroke="#ffc832"/>
                    <text x="${x}" y="70" text-anchor="middle" fill="#8b9cb3" font-size="11">${v}</text>`;
                }).join('')}
                <circle cx="360" cy="50" r="6" fill="none" stroke="#4fc3f7" stroke-width="2"/>
                <circle cx="430" cy="50" r="6" fill="#4fc3f7"/>
                <line x1="366" y1="50" x2="424" y2="50" stroke="#4fc3f7" stroke-width="4"/>
                <text x="360" y="30" text-anchor="middle" fill="#4fc3f7" font-size="12">2</text>
                <text x="430" y="30" text-anchor="middle" fill="#4fc3f7" font-size="12">5</text>
            `;
            showToast('不等式组');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        initFormulas();
        solve();
    </script>
</body>
</html>
