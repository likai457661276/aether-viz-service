<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一次函数 - 初中数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            color: #e0e6ed;
            overflow-x: hidden;
        }
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%);
            border-right: 1px solid rgba(255, 200, 50, 0.2);
            padding: 24px;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }
        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 200, 50, 0.4) 0%, transparent 100%);
        }
        .sidebar h1 {
            font-size: 1.5rem;
            color: #ffc832;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 200, 50, 0.3);
        }
        .sidebar .subtitle {
            font-size: 0.85rem;
            color: #8b9cb3;
            margin-bottom: 24px;
        }
        .section {
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 200, 50, 0.1);
        }
        .section-title {
            font-size: 0.9rem;
            color: #ffc832;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, #ffc832, #ff9500);
            border-radius: 2px;
        }
        .formula-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 200, 50, 0.15);
        }
        .formula-box .katex {
            font-size: 1.4rem;
            color: #fff;
        }
        .principle-text {
            font-size: 0.85rem;
            line-height: 1.7;
            color: #b0bec5;
        }
        .application-item {
            padding: 10px 12px;
            background: rgba(255, 200, 50, 0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #90a4ae;
            border-left: 3px solid rgba(255, 200, 50, 0.3);
        }
        .main-content {
            flex: 1;
            padding: 24px;
            position: relative;
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 200, 50, 0.15);
            padding: 20px;
            margin-bottom: 20px;
            height: 450px;
        }
        #plot { width: 100%; height: 100%; }
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .control-group {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 200, 50, 0.1);
        }
        .control-label {
            font-size: 0.85rem;
            color: #ffc832;
            margin-bottom: 10px;
            display: block;
        }
        .control-value {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 200, 50, 0.2);
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffc832, #ff9500);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 200, 50, 0.5);
        }
        .result-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 200, 50, 0.1);
            text-align: center;
        }
        .result-label {
            font-size: 0.8rem;
            color: #8b9cb3;
            margin-bottom: 6px;
        }
        .result-value {
            font-size: 1.3rem;
            color: #ffc832;
            font-weight: bold;
        }
        .result-value.highlight { color: #4fc3f7; }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffc832, #ff9500);
            color: #0a1929;
            font-weight: bold;
        }
        .btn-secondary {
            background: rgba(255, 200, 50, 0.15);
            color: #ffc832;
            border: 1px solid rgba(255, 200, 50, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #ffc832, #ff9500);
            color: #0a1929;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; max-height: 40vh; }
            .chart-container { height: 350px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>一次函数</h1>
            <p class="subtitle">初中数学 · 八年级上册</p>

            <div class="section">
                <div class="section-title">核心公式</div>
                <div class="formula-box" id="formula1"></div>
                <div class="formula-box" id="formula2"></div>
            </div>

            <div class="section">
                <div class="section-title">原理解释</div>
                <p class="principle-text">
                    一次函数描述了两个变量之间的<strong style="color:#ffc832">线性关系</strong>。
                    当 k&gt;0 时，图像<strong style="color:#4fc3f7">上升</strong>；当 k&lt;0 时，图像<strong style="color:#ff5252">下降</strong>。
                    b 是函数图像在 y 轴上的<strong style="color:#ffc832">截距</strong>，即与 y 轴的交点。
                </p>
            </div>

            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">📈 商品价格随数量的变化关系</div>
                <div class="application-item">📏 行程问题中路程与时间的关系</div>
                <div class="application-item">💰 手机话费与通话时长的关系</div>
                <div class="application-item">🌡️ 温度摄氏与华氏的转换</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="chart-container">
                <div id="plot"></div>
            </div>

            <div class="control-panel">
                <div class="control-group">
                    <label class="control-label">斜率 k</label>
                    <div class="control-value" id="kValue">k = 2</div>
                    <input type="range" id="kSlider" min="-5" max="5" step="0.1" value="2">
                </div>
                <div class="control-group">
                    <label class="control-label">截距 b</label>
                    <div class="control-value" id="bValue">b = 1</div>
                    <input type="range" id="bSlider" min="-5" max="5" step="0.1" value="1">
                </div>
            </div>

            <div class="result-panel">
                <div class="result-card">
                    <div class="result-label">函数解析式</div>
                    <div class="result-value" id="functionExpr">y = 2x + 1</div>
                </div>
                <div class="result-card">
                    <div class="result-label">x = 0 时</div>
                    <div class="result-value highlight" id="yAtZero">(0, 1)</div>
                </div>
                <div class="result-card">
                    <div class="result-label">y = 0 时</div>
                    <div class="result-value highlight" id="xAtZero">x = -0.5</div>
                </div>
                <div class="result-card">
                    <div class="result-label">变化趋势</div>
                    <div class="result-value" id="trendText">上升</div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="resetValues()">重置参数</button>
                <button class="btn btn-secondary" onclick="randomValues()">随机函数</button>
                <button class="btn btn-secondary" onclick="showSpecialLines()">特殊直线</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let k = 2, b = 1;

        function initFormulas() {
            katex.render("y = kx + b", document.getElementById('formula1'));
            katex.render("\\text{当 } x = x_0 \\text{ 时}, y = kx_0 + b", document.getElementById('formula2'));
        }

        function updatePlot() {
            const x = [], y = [];
            for (let i = -10; i <= 10; i += 0.1) {
                x.push(i);
                y.push(k * i + b);
            }

            const trace = {
                x: x, y: y,
                mode: 'lines',
                line: { color: '#ffc832', width: 3 },
                name: `y = ${k}x + ${b}`
            };

            const axisRange = [-8, 8];

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0.3)',
                font: { color: '#e0e6ed', family: 'Segoe UI, Microsoft YaHei' },
                xaxis: {
                    range: axisRange,
                    gridcolor: 'rgba(255, 200, 50, 0.15)',
                    zerolinecolor: 'rgba(255, 200, 50, 0.5)',
                    title: 'x'
                },
                yaxis: {
                    range: axisRange,
                    gridcolor: 'rgba(255, 200, 50, 0.15)',
                    zerolinecolor: 'rgba(255, 200, 50, 0.5)',
                    title: 'y'
                },
                margin: { t: 20, r: 20, b: 40, l: 40 },
                showlegend: false
            };

            Plotly.react('plot', [trace], layout, { displayModeBar: false });
        }

        function updateResults() {
            let expr;
            if (k === 0) {
                expr = `y = ${b}`;
            } else if (b === 0) {
                expr = `y = ${k}x`;
            } else {
                const signB = b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`;
                expr = `y = ${k}x ${signB}`;
            }
            document.getElementById('functionExpr').textContent = expr;
            document.getElementById('kValue').textContent = `k = ${k}`;
            document.getElementById('bValue').textContent = `b = ${b}`;

            document.getElementById('yAtZero').textContent = `(0, ${b})`;

            const xZero = k !== 0 ? (-b / k).toFixed(2) : '无定义';
            document.getElementById('xAtZero').textContent = k !== 0 ? `x = ${xZero}` : 'k=0时无交点';

            document.getElementById('trendText').textContent = k > 0 ? '上升 ↗' : k < 0 ? '下降 ↘' : '水平 —';
            document.getElementById('trendText').style.color = k > 0 ? '#4fc3f7' : k < 0 ? '#ff5252' : '#90a4ae';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function resetValues() {
            k = 2; b = 1;
            document.getElementById('kSlider').value = k;
            document.getElementById('bSlider').value = b;
            updatePlot();
            updateResults();
            showToast('参数已重置');
        }

        function randomValues() {
            k = Math.round((Math.random() * 10 - 5) * 10) / 10;
            b = Math.round((Math.random() * 10 - 5) * 10) / 10;
            document.getElementById('kSlider').value = k;
            document.getElementById('bSlider').value = b;
            updatePlot();
            updateResults();
            showToast('生成随机函数');
        }

        function showSpecialLines() {
            const traces = [];

            const x = [];
            const y0 = [], y1 = [], y2 = [], y3 = [];
            for (let i = -8; i <= 8; i += 0.1) {
                x.push(i);
                y0.push(i);
                y1.push(2 * i);
                y2.push(-i + 2);
                y3.push(3);
            }

            traces.push({ x: x, y: y0, mode: 'lines', line: { color: '#4fc3f7', width: 2 }, name: 'y = x' });
            traces.push({ x: x, y: y1, mode: 'lines', line: { color: '#ff5252', width: 2 }, name: 'y = 2x' });
            traces.push({ x: x, y: y2, mode: 'lines', line: { color: '#69f0ae', width: 2 }, name: 'y = -x + 2' });
            traces.push({ x: x, y: y3, mode: 'lines', line: { color: '#ff9500', width: 2, dash: 'dash' }, name: 'y = 3' });

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0.3)',
                font: { color: '#e0e6ed' },
                xaxis: { range: [-8, 8], gridcolor: 'rgba(255, 200, 50, 0.15)', zerolinecolor: 'rgba(255, 200, 50, 0.5)' },
                yaxis: { range: [-8, 8], gridcolor: 'rgba(255, 200, 50, 0.15)', zerolinecolor: 'rgba(255, 200, 50, 0.5)' },
                margin: { t: 20, r: 20, b: 40, l: 40 },
                showlegend: true,
                legend: { x: 1, y: 1 }
            };

            Plotly.react('plot', traces, layout, { displayModeBar: false });
            showToast('特殊直线对比');
        }

        document.getElementById('kSlider').addEventListener('input', (e) => {
            k = parseFloat(e.target.value);
            updatePlot();
            updateResults();
        });

        document.getElementById('bSlider').addEventListener('input', (e) => {
            b = parseFloat(e.target.value);
            updatePlot();
            updateResults();
        });

        initFormulas();
        updatePlot();
        updateResults();
    </script>
</body>
</html>
