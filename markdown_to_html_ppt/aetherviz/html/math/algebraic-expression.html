<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整式 - 初一数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%); min-height: 100vh; color: #e0e6ed; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%); border-right: 1px solid rgba(255, 200, 50, 0.2); padding: 24px; overflow-y: auto; }
        .sidebar h1 { font-size: 1.5rem; color: #ffc832; margin-bottom: 8px; }
        .sidebar .subtitle { font-size: 0.85rem; color: #8b9cb3; margin-bottom: 24px; }
        .section { margin-bottom: 24px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .section-title { font-size: 0.9rem; color: #ffc832; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #ffc832, #ff9500); border-radius: 2px; }
        .formula-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255, 200, 50, 0.15); }
        .principle-text { font-size: 0.85rem; line-height: 1.7; color: #b0bec5; }
        .principle-text strong { color: #ffc832; }
        .application-item { padding: 10px 12px; background: rgba(255, 200, 50, 0.05); border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; color: #90a4ae; border-left: 3px solid rgba(255, 200, 50, 0.3); }
        .main-content { flex: 1; padding: 24px; }
        .display-card { background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 200, 50, 0.15); padding: 24px; margin-bottom: 20px; }
        .display-card h3 { color: #ffc832; margin-bottom: 16px; }
        .term-list { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .term-item { padding: 12px 20px; background: rgba(255,200,50,0.08); border-radius: 8px; border: 1px solid rgba(255,200,50,0.2); font-family: 'Consolas', monospace; font-size: 1.1rem; }
        .term-item.coefficient { background: rgba(79, 195, 247, 0.15); border-color: rgba(79, 195, 247, 0.3); color: #4fc3f7; }
        .term-item.variable { background: rgba(255, 82, 82, 0.15); border-color: rgba(255, 82, 82, 0.3); color: #ff5252; }
        .term-item.exponent { background: rgba(105, 240, 174, 0.15); border-color: rgba(105, 240, 174, 0.3); color: #69f0ae; }
        .expression-display { background: rgba(0,0,0,0.4); padding: 24px; border-radius: 12px; text-align: center; margin: 16px 0; }
        .expression-main { font-size: 2rem; color: #fff; font-family: 'Consolas', monospace; }
        .analysis-box { background: rgba(255,200,50,0.05); padding: 16px; border-radius: 8px; margin-top: 16px; }
        .analysis-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .analysis-item:last-child { border-bottom: none; }
        .analysis-label { color: #8b9cb3; }
        .analysis-value { color: #ffc832; font-weight: bold; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .control-group { background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .control-label { font-size: 0.85rem; color: #ffc832; margin-bottom: 10px; display: block; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,200,50,0.3); font-size: 1rem; font-family: 'Consolas', monospace; }
        select { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,200,50,0.3); font-size: 1rem; }
        select option { background: #1a2a4a; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; font-weight: bold; }
        .btn-secondary { background: rgba(255, 200, 50, 0.15); color: #ffc832; border: 1px solid rgba(255, 200, 50, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; padding: 12px 24px; border-radius: 8px; font-weight: bold; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>整式</h1>
            <p class="subtitle">初一数学 · 第五章</p>
            <div class="section">
                <div class="section-title">核心概念</div>
                <div class="formula-box" id="f1"></div>
                <div class="formula-box" id="f2"></div>
            </div>
            <div class="section">
                <div class="section-title">概念解析</div>
                <p class="principle-text">
                    <strong>单项式：</strong>数与字母的乘积，如 3x, -5a²<br><br>
                    <strong>多项式：</strong>几个单项式的和，如 3x + 2, a² - 2a + 1<br><br>
                    <strong>项：</strong>多项式中的每个单项式<br><br>
                    <strong>次数：</strong>单项式中所有字母指数的和<br><br>
                    <strong>常数项：</strong>不含字母的项
                </p>
            </div>
            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">📐 矩形面积：长a宽b，S=ab</div>
                <div class="application-item">📊 行程问题：s = vt + s₀</div>
                <div class="application-item">💰 商品总价：总价 = 单价 × 数量</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="display-card">
                <h3>📝 整式识别与分析</h3>
                <div class="term-list" id="termList">
                    <span class="term-item coefficient">系数：3</span>
                    <span class="term-item variable">变量：x</span>
                    <span class="term-item exponent">指数：2</span>
                </div>
                <div class="expression-display">
                    <div class="expression-main" id="exprMain">3x²</div>
                </div>
                <div class="analysis-box">
                    <div class="analysis-item"><span class="analysis-label">表达式类型</span><span class="analysis-value" id="typeDisplay">单项式</span></div>
                    <div class="analysis-item"><span class="analysis-label">项数</span><span class="analysis-value" id="termCount">1</span></div>
                    <div class="analysis-item"><span class="analysis-label">最高次数</span><span class="analysis-value" id="maxDegree">2</span></div>
                    <div class="analysis-item"><span class="analysis-label">常数项</span><span class="analysis-value" id="constTerm">无</span></div>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-group">
                    <label class="control-label">选择表达式类型</label>
                    <select id="typeSelect" onchange="updateExpression()">
                        <option value="monomial">单项式</option>
                        <option value="binomial">二项式</option>
                        <option value="trinomial">三项式</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">示例选择</label>
                    <select id="exampleSelect" onchange="loadExample()">
                        <option value="3x²">3x²</option>
                        <option value="-5a³">-5a³</option>
                        <option value="2xy">2xy</option>
                        <option value="x+1">x + 1</option>
                        <option value="3x²-2x+1">3x² - 2x + 1</option>
                        <option value="a²-b">a² - b</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="randomExpression()">随机生成</button>
                <button class="btn btn-secondary" onclick="showTypes()">类型对比</button>
                <button class="btn btn-secondary" onclick="showDegree()">次数分析</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function initFormulas() {
            katex.render("\\text{单项式} = \\text{系数} \\times \\text{字母}", document.getElementById('f1'));
            katex.render("\\text{多项式} = \\text{项}_1 + \\text{项}_2 + \\cdots", document.getElementById('f2'));
        }

        const examples = {
            '3x²': { type: '单项式', terms: 1, degree: 2, constant: '无', parts: ['3', 'x²'] },
            '-5a³': { type: '单项式', terms: 1, degree: 3, constant: '无', parts: ['-5', 'a³'] },
            '2xy': { type: '单项式', terms: 1, degree: 2, constant: '无', parts: ['2', 'xy'] },
            'x+1': { type: '二项式', terms: 2, degree: 1, constant: '1', parts: ['x', '1'] },
            '3x²-2x+1': { type: '三项式', terms: 3, degree: 2, constant: '1', parts: ['3x²', '-2x', '1'] },
            'a²-b': { type: '二项式', terms: 2, degree: 2, constant: '无', parts: ['a²', '-b'] }
        };

        function updateDisplay(expr, data) {
            document.getElementById('exprMain').textContent = expr;
            document.getElementById('typeDisplay').textContent = data.type;
            document.getElementById('termCount').textContent = data.terms;
            document.getElementById('maxDegree').textContent = data.degree;
            document.getElementById('constTerm').textContent = data.constant;

            const termList = document.getElementById('termList');
            termList.innerHTML = data.parts.map((p, i) => {
                const isNum = !isNaN(p) || (p.startsWith('-') && !isNaN(p.slice(1)));
                return `<span class="term-item ${isNum ? 'coefficient' : 'variable'}">${p}</span>`;
            }).join('');
        }

        function updateExpression() {
            const select = document.getElementById('exampleSelect').value;
            loadExampleByExpr(select);
        }

        function loadExample() {
            const expr = document.getElementById('exampleSelect').value;
            loadExampleByExpr(expr);
        }

        function loadExampleByExpr(expr) {
            const data = examples[expr];
            if (data) updateDisplay(expr, data);
        }

        function randomExpression() {
            const keys = Object.keys(examples);
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            document.getElementById('exampleSelect').value = randomKey;
            loadExampleByExpr(randomKey);
            showToast('随机生成');
        }

        function showTypes() {
            const container = document.getElementById('termList');
            container.innerHTML = `
                <span class="term-item coefficient">单项式：3x²</span>
                <span class="term-item coefficient">二项式：x+1</span>
                <span class="term-item coefficient">三项式：x²+x+1</span>
            `;
            document.getElementById('exprMain').innerHTML = '单项式 · 二项式 · 三项式';
            document.getElementById('typeDisplay').textContent = '分类';
            document.getElementById('termCount').textContent = '—';
            document.getElementById('maxDegree').textContent = '—';
            document.getElementById('constTerm').textContent = '—';
            showToast('整式类型');
        }

        function showDegree() {
            const container = document.getElementById('termList');
            container.innerHTML = `
                <span class="term-item">x：1次</span>
                <span class="term-item">x²：2次</span>
                <span class="term-item">x³：3次</span>
                <span class="term-item">xy：2次</span>
                <span class="term-item">x²y：3次</span>
            `;
            document.getElementById('exprMain').textContent = '次数判定';
            document.getElementById('typeDisplay').textContent = '单项式次数';
            document.getElementById('termCount').textContent = '字母指数和';
            document.getElementById('maxDegree').textContent = '各项最大值';
            document.getElementById('constTerm').textContent = '常数项为0次';
            showToast('次数分析');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        initFormulas();
        loadExampleByExpr('3x²');
    </script>
</body>
</html>
