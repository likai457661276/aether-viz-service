<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轴对称 - 初一数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%); min-height: 100vh; color: #e0e6ed; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%); border-right: 1px solid rgba(255, 200, 50, 0.2); padding: 24px; overflow-y: auto; }
        .sidebar h1 { font-size: 1.5rem; color: #ffc832; margin-bottom: 8px; }
        .sidebar .subtitle { font-size: 0.85rem; color: #8b9cb3; margin-bottom: 24px; }
        .section { margin-bottom: 24px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .section-title { font-size: 0.9rem; color: #ffc832; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #ffc832, #ff9500); border-radius: 2px; }
        .formula-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255, 200, 50, 0.15); }
        .principle-text { font-size: 0.85rem; line-height: 1.7; color: #b0bec5; }
        .principle-text strong { color: #ffc832; }
        .application-item { padding: 10px 12px; background: rgba(255, 200, 50, 0.05); border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; color: #90a4ae; border-left: 3px solid rgba(255, 200, 50, 0.3); }
        .main-content { flex: 1; padding: 24px; }
        .visual-container { background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 200, 50, 0.15); padding: 24px; margin-bottom: 20px; text-align: center; }
        .symmetry-figure { width: 100%; max-width: 500px; height: 250px; margin: 0 auto; }
        .shapes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 16px; }
        .shape-card { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255,200,50,0.2); }
        .shape-card:hover { border-color: #ffc832; transform: translateY(-2px); }
        .shape-card.active { border-color: #ffc832; background: rgba(255,200,50,0.1); }
        .shape-card svg { width: 60px; height: 60px; }
        .shape-card h5 { color: #ffc832; margin-top: 6px; font-size: 0.85rem; }
        .shape-card p { color: #b0bec5; font-size: 0.7rem; margin-top: 2px; }
        .info-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-top: 12px; text-align: left; }
        .info-box h4 { color: #ffc832; margin-bottom: 6px; font-size: 0.9rem; }
        .info-box p { color: #b0bec5; font-size: 0.8rem; line-height: 1.5; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .control-group { background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .control-label { font-size: 0.8rem; color: #ffc832; margin-bottom: 8px; display: block; }
        .control-value { font-size: 1.1rem; color: #fff; margin-bottom: 6px; font-weight: bold; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: rgba(255, 200, 50, 0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, #ffc832, #ff9500); cursor: pointer; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; font-weight: bold; }
        .btn-secondary { background: rgba(255, 200, 50, 0.15); color: #ffc832; border: 1px solid rgba(255, 200, 50, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; padding: 10px 20px; border-radius: 8px; font-weight: bold; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>轴对称</h1>
            <p class="subtitle">初一数学 · 下学期第七章</p>
            <div class="section">
                <div class="section-title">核心概念</div>
                <p class="principle-text">
                    <strong>轴对称图形：</strong><br>
                    沿一条直线折叠，直线两旁的部分能完全重合<br><br>
                    <strong>对称轴：</strong><br>
                    这条直线叫做对称轴
                </p>
            </div>
            <div class="section">
                <div class="section-title">性质</div>
                <div class="formula-box" id="f1"></div>
                <div class="formula-box" id="f2"></div>
            </div>
            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">🏠 建筑设计：对称美学</div>
                <div class="application-item">🎭 艺术创作</div>
                <div class="application-item">📐 剪纸艺术</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="visual-container">
                <h3 style="color:#ffc832;margin-bottom:12px;">🔄 轴对称变换演示</h3>
                <svg class="symmetry-figure" id="symmetrySvg" viewBox="0 0 400 200">
                    <line x1="200" y1="15" x2="200" y2="185" stroke="#ff5252" stroke-width="2" stroke-dasharray="5,5"/>
                    <rect x="120" y="50" width="60" height="40" fill="rgba(255,200,50,0.2)" stroke="#ffc832" stroke-width="2"/>
                    <rect x="120" y="50" width="60" height="40" fill="rgba(79,195,247,0.2)" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="5,3" transform="translate(400,0) scale(-1,1)"/>
                    <text x="200" y="10" text-anchor="middle" fill="#ff5252" font-size="11">对称轴</text>
                </svg>
                <div class="info-box">
                    <h4>📐 矩形是轴对称图形</h4>
                    <p>矩形有2条对称轴。沿对称轴折叠后，两侧完全重合。</p>
                </div>
            </div>

            <div class="shapes-grid">
                <div class="shape-card active" onclick="selectShape('rectangle', 2)">
                    <svg viewBox="0 0 60 60"><rect x="5" y="15" width="50" height="30" fill="none" stroke="#ffc832" stroke-width="2"/><line x1="30" y1="5" x2="30" y2="55" stroke="#ff5252" stroke-width="1" stroke-dasharray="3,3"/></svg>
                    <h5>矩形</h5><p>2条对称轴</p>
                </div>
                <div class="shape-card" onclick="selectShape('circle', '无数')">
                    <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" fill="none" stroke="#ffc832" stroke-width="2"/><line x1="30" y1="2" x2="30" y2="58" stroke="#ff5252" stroke-width="1" stroke-dasharray="3,3"/><line x1="2" y1="30" x2="58" y2="30" stroke="#ff5252" stroke-width="1" stroke-dasharray="3,3"/></svg>
                    <h5>圆形</h5><p>无数条对称轴</p>
                </div>
                <div class="shape-card" onclick="selectShape('triangle', 1)">
                    <svg viewBox="0 0 60 60"><polygon points="30,5 5,55 55,55" fill="none" stroke="#ffc832" stroke-width="2"/><line x1="30" y1="5" x2="30" y2="55" stroke="#ff5252" stroke-width="1" stroke-dasharray="3,3"/></svg>
                    <h5>等腰三角形</h5><p>1条对称轴</p>
                </div>
                <div class="shape-card" onclick="selectShape('diamond', 2)">
                    <svg viewBox="0 0 60 60"><polygon points="30,5 55,30 30,55 5,30" fill="none" stroke="#ffc832" stroke-width="2"/><line x1="3" y1="3" x2="57" y2="57" stroke="#ff5252" stroke-width="1" stroke-dasharray="3,3"/><line x1="57" y1="3" x2="3" y2="57" stroke="#ff5252" stroke-width="1" stroke-dasharray="3,3"/></svg>
                    <h5>菱形</h5><p>2条对称轴</p>
                </div>
            </div>

            <div class="control-panel" style="margin-top:16px;">
                <div class="control-group">
                    <label class="control-label">对称轴数量</label>
                    <div class="control-value" id="axisCount">2条</div>
                    <input type="range" id="axisSlider" min="1" max="4" value="2" oninput="updateAxisCount()">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="randomShape()">随机图形</button>
                <button class="btn btn-secondary" onclick="showSymmetry()">对称性质</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function initFormulas() {
            katex.render("\\text{对应点到对称轴距离相等}", document.getElementById('f1'));
            katex.render("\\text{对应线段相等，对应角相等}", document.getElementById('f2'));
        }

        function selectShape(shape, axes) {
            document.querySelectorAll('.shape-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const displayAxes = axes === '无数' ? '无数条' : `${axes}条`;
            document.getElementById('axisSlider').value = axes === '无数' ? 2 : axes;
            document.getElementById('axisCount').textContent = displayAxes;
            showToast(`${shape === 'rectangle' ? '矩形' : shape === 'circle' ? '圆形' : shape === 'triangle' ? '等腰三角形' : '菱形'}: ${displayAxes}对称轴`);
        }

        function updateAxisCount() {
            const count = document.getElementById('axisSlider').value;
            document.getElementById('axisCount').textContent = `${count}条`;
        }

        function randomShape() {
            const shapes = document.querySelectorAll('.shape-card');
            shapes[Math.floor(Math.random() * shapes.length)].click();
        }

        function showSymmetry() {
            showToast('轴对称性质：对应点距离相等，线段、角相等');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        initFormulas();
    </script>
</body>
</html>
