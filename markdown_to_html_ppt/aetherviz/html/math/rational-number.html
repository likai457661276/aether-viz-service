<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有理数 - 初一数学知识点</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.css">
    <script src="https://registry.npmmirror.com/katex/0.16.9/files/dist/katex.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a1929 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            color: #e0e6ed;
            overflow-x: hidden;
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, rgba(20, 40, 70, 0.95) 0%, rgba(10, 25, 50, 0.98) 100%);
            border-right: 1px solid rgba(255, 200, 50, 0.2);
            padding: 24px;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }
        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 200, 50, 0.4) 0%, transparent 100%);
        }
        .sidebar h1 { font-size: 1.5rem; color: #ffc832; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255, 200, 50, 0.3); }
        .sidebar .subtitle { font-size: 0.85rem; color: #8b9cb3; margin-bottom: 24px; }
        .section { margin-bottom: 24px; padding: 16px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .section-title { font-size: 0.9rem; color: #ffc832; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #ffc832, #ff9500); border-radius: 2px; }
        .formula-box { background: rgba(0, 0, 0, 0.3); padding: 16px; border-radius: 8px; text-align: center; margin-bottom: 12px; border: 1px solid rgba(255, 200, 50, 0.15); }
        .formula-box .katex { font-size: 1.4rem; color: #fff; }
        .principle-text { font-size: 0.85rem; line-height: 1.7; color: #b0bec5; }
        .principle-text strong { color: #ffc832; }
        .application-item { padding: 10px 12px; background: rgba(255, 200, 50, 0.05); border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; color: #90a4ae; border-left: 3px solid rgba(255, 200, 50, 0.3); }
        .main-content { flex: 1; padding: 24px; position: relative; }
        .visual-container { background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px solid rgba(255, 200, 50, 0.15); padding: 20px; margin-bottom: 20px; }
        .number-line { position: relative; height: 120px; margin: 20px 0; }
        .number-line svg { width: 100%; height: 100%; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .control-group { background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); }
        .control-label { font-size: 0.85rem; color: #ffc832; margin-bottom: 10px; display: block; }
        .control-value { font-size: 1.2rem; color: #fff; margin-bottom: 8px; font-weight: bold; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: rgba(255, 200, 50, 0.2); outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #ffc832, #ff9500); cursor: pointer; box-shadow: 0 0 10px rgba(255, 200, 50, 0.5); }
        select { width: 100%; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid rgba(255,200,50,0.3); font-size: 1rem; cursor: pointer; }
        select option { background: #1a2a4a; }
        .result-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
        .result-card { background: rgba(255, 255, 255, 0.03); padding: 16px; border-radius: 12px; border: 1px solid rgba(255, 200, 50, 0.1); text-align: center; }
        .result-label { font-size: 0.8rem; color: #8b9cb3; margin-bottom: 6px; }
        .result-value { font-size: 1.3rem; color: #ffc832; font-weight: bold; }
        .result-value.positive { color: #4fc3f7; }
        .result-value.negative { color: #ff5252; }
        .result-value.zero { color: #90a4ae; }
        .btn-group { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s ease; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; font-weight: bold; }
        .btn-secondary { background: rgba(255, 200, 50, 0.15); color: #ffc832; border: 1px solid rgba(255, 200, 50, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 200, 50, 0.3); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #ffc832, #ff9500); color: #0a1929; padding: 12px 24px; border-radius: 8px; font-weight: bold; opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
        .info-item { text-align: center; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .info-item .label { font-size: 0.75rem; color: #8b9cb3; }
        .info-item .value { font-size: 1.1rem; color: #ffc832; margin-top: 4px; }
        @media (max-width: 768px) { .app-container { flex-direction: column; } .sidebar { width: 100%; max-height: 40vh; } .info-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>有理数</h1>
            <p class="subtitle">初一数学 · 第一章</p>
            <div class="section">
                <div class="section-title">核心概念</div>
                <div class="formula-box" id="formula1"></div>
                <div class="formula-box" id="formula2"></div>
                <div class="formula-box" id="formula3"></div>
            </div>
            <div class="section">
                <div class="section-title">原理解释</div>
                <p class="principle-text">
                    <strong>正数</strong>：大于 0 的数，如 3、5.2、1/3<br>
                    <strong>负数</strong>：小于 0 的数，如 -3、-5.2、-1/3<br>
                    <strong>零</strong>：0 既不是正数也不是负数<br>
                    <strong>数轴</strong>：规定了原点、正方向、单位长度的直线<br>
                    <strong>相反数</strong>：只有符号不同的两个数，互为相反数<br>
                    <strong>绝对值</strong>：数轴上表示数的点到原点的距离
                </p>
            </div>
            <div class="section">
                <div class="section-title">真实应用</div>
                <div class="application-item">🌡️ 温度表示：零上5度记为+5°C，零下3度记为-3°C</div>
                <div class="application-item">📊 海拔高度：高于海平面记为正，低于海平面记为负</div>
                <div class="application-item">💰 收支记录：收入记为正，支出记为负</div>
            </div>
        </aside>

        <main class="main-content">
            <div class="visual-container">
                <h3 style="color:#ffc832;margin-bottom:16px;">📏 数轴与有理数</h3>
                <div class="number-line">
                    <svg id="numberLineSvg" viewBox="0 0 800 120"></svg>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="label">数的类型</div>
                        <div class="value" id="typeDisplay">正数</div>
                    </div>
                    <div class="info-item">
                        <div class="label">相反数</div>
                        <div class="value" id="oppositeDisplay">-5</div>
                    </div>
                    <div class="info-item">
                        <div class="label">绝对值</div>
                        <div class="value" id="absDisplay">5</div>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-group">
                    <label class="control-label">选择一个数</label>
                    <select id="numberSelect" onchange="updateNumberLine()">
                        <option value="5">5（正整数）</option>
                        <option value="-5">-5（负整数）</option>
                        <option value="3.5">3.5（正小数）</option>
                        <option value="-3.5">-3.5（负小数）</option>
                        <option value="0">0（零）</option>
                        <option value="2/3">2/3（正分数）</option>
                        <option value="-2/3">-2/3（负分数）</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">或输入自定义数值</label>
                    <div class="control-value" id="customValue">5</div>
                    <input type="range" id="customSlider" min="-10" max="10" step="0.1" value="5">
                </div>
            </div>

            <div class="result-panel">
                <div class="result-card">
                    <div class="result-label">数轴位置</div>
                    <div class="result-value" id="positionDisplay">5</div>
                </div>
                <div class="result-card">
                    <div class="result-label">符号</div>
                    <div class="result-value" id="signDisplay">+</div>
                </div>
                <div class="result-card">
                    <div class="result-label">绝对值</div>
                    <div class="result-value" id="absResult">|5| = 5</div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="resetNumber()">重置</button>
                <button class="btn btn-secondary" onclick="randomNumber()">随机一个数</button>
                <button class="btn btn-secondary" onclick="showComparison()">比较大小</button>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentValue = 5;

        function initFormulas() {
            katex.render("|a| = \\begin{cases} a & (a \\geq 0) \\\\ -a & (a < 0) \\end{cases}", document.getElementById('formula1'));
            katex.render("a + (-a) = 0", document.getElementById('formula2'));
            katex.render("-(-a) = a", document.getElementById('formula3'));
        }

        function drawNumberLine(highlightValue) {
            const svg = document.getElementById('numberLineSvg');
            const width = 800;
            const height = 120;
            const centerX = width / 2;
            const scale = 35;

            let html = `
                <defs>
                    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ff5252"/>
                        <stop offset="50%" style="stop-color:#ffc832"/>
                        <stop offset="100%" style="stop-color:#4fc3f7"/>
                    </linearGradient>
                </defs>
                <line x1="30" y1="60" x2="${width-30}" y2="60" stroke="url(#lineGrad)" stroke-width="2"/>
                <line x1="30" y1="55" x2="30" y2="65" stroke="#ffc832" stroke-width="2"/>
                <line x1="${width-30}" y1="55" x2="${width-30}" y2="65" stroke="#ffc832" stroke-width="2"/>
                <polygon points="${width-30},60 ${width-40},50 ${width-40},70" fill="#ffc832"/>
                <text x="${width-25}" y="45" fill="#ffc832" font-size="12">→</text>
            `;

            for (let i = -10; i <= 10; i++) {
                const x = centerX + i * scale;
                const isHighlight = Math.abs(i - highlightValue) < 0.1;
                const isZero = i === 0;

                html += `<line x1="${x}" y1="${isZero ? 50 : 55}" x2="${x}" y2="65" stroke="${isHighlight ? '#ff5252' : '#ffc832'}" stroke-width="${isHighlight ? 3 : 1.5}"/>`;
                html += `<text x="${x}" y="80" text-anchor="middle" fill="${isHighlight ? '#ff5252' : '#b0bec5'}" font-size="12" font-weight="${isHighlight ? 'bold' : 'normal'}">${i}</text>`;

                if (isHighlight) {
                    const y = 30;
                    html += `<circle cx="${x}" cy="${y}" r="8" fill="#ff5252"/>`;
                    html += `<text x="${x}" y="${y + 4}" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">${i}</text>`;
                }
            }

            html += `<text x="30" y="45" fill="#ffc832" font-size="12">←</text>`;
            html += `<text x="${centerX}" y="95" text-anchor="middle" fill="#8b9cb3" font-size="11">数轴</text>`;

            svg.innerHTML = html;
        }

        function updateNumberLine() {
            const select = document.getElementById('numberSelect').value;
            const customSlider = document.getElementById('customSlider');

            if (select !== 'custom') {
                currentValue = parseFloat(select);
                customSlider.value = currentValue;
            } else {
                currentValue = parseFloat(customSlider.value);
            }

            updateDisplay();
            drawNumberLine(currentValue);
        }

        function updateDisplay() {
            const display = document.getElementById('positionDisplay');
            const signDisplay = document.getElementById('signDisplay');
            const absResult = document.getElementById('absResult');
            const typeDisplay = document.getElementById('typeDisplay');
            const oppositeDisplay = document.getElementById('oppositeDisplay');
            const absDisplay = document.getElementById('absDisplay');
            const customValue = document.getElementById('customValue');

            display.textContent = currentValue;
            customValue.textContent = currentValue;

            if (currentValue > 0) {
                signDisplay.textContent = '+';
                signDisplay.className = 'result-value positive';
                typeDisplay.textContent = '正数';
                typeDisplay.style.color = '#4fc3f7';
            } else if (currentValue < 0) {
                signDisplay.textContent = '−';
                signDisplay.className = 'result-value negative';
                typeDisplay.textContent = '负数';
                typeDisplay.style.color = '#ff5252';
            } else {
                signDisplay.textContent = '0';
                signDisplay.className = 'result-value zero';
                typeDisplay.textContent = '零';
                typeDisplay.style.color = '#90a4ae';
            }

            const abs = Math.abs(currentValue);
            absResult.textContent = `|${currentValue}| = ${abs}`;
            absDisplay.textContent = abs;
            oppositeDisplay.textContent = -currentValue;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function resetNumber() {
            currentValue = 5;
            document.getElementById('numberSelect').value = '5';
            document.getElementById('customSlider').value = 5;
            updateDisplay();
            drawNumberLine(currentValue);
            showToast('已重置');
        }

        function randomNumber() {
            const values = [5, -5, 3.5, -3.5, 0, 0.667, -0.667, 8, -8, 1/3];
            currentValue = values[Math.floor(Math.random() * values.length)];
            document.getElementById('customSlider').value = Math.max(-10, Math.min(10, currentValue));
            updateDisplay();
            drawNumberLine(currentValue);
            showToast(`随机数: ${currentValue}`);
        }

        function showComparison() {
            const a = Math.round((Math.random() * 20 - 10) * 10) / 10;
            const b = Math.round((Math.random() * 20 - 10) * 10) / 10;
            const maxVal = Math.max(a, b);
            const minVal = Math.min(a, b);

            drawNumberLine(a);
            setTimeout(() => {
                const svg = document.getElementById('numberLineSvg');
                const width = 800;
                const centerX = width / 2;
                const scale = 35;
                const x = centerX + b * scale;

                svg.innerHTML += `<circle cx="${x}" cy="30" r="8" fill="#4fc3f7"/>`;
                svg.innerHTML += `<text x="${x}" y="${34}" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">${b}</text>`;
            }, 100);

            showToast(`${maxVal} > ${minVal}`);
        }

        document.getElementById('customSlider').addEventListener('input', (e) => {
            document.getElementById('numberSelect').value = 'custom';
            currentValue = parseFloat(e.target.value);
            updateDisplay();
            drawNumberLine(currentValue);
        });

        initFormulas();
        updateDisplay();
        drawNumberLine(5);
    </script>
</body>
</html>
