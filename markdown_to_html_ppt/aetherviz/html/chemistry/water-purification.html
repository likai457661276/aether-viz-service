<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水的净化 | Water Purification</title>
    <script src="https://registry.npmmirror.com/@tailwindcss/browser/4.3.0/files/dist/index.global.js"></script>
    <style>
        @import url('https://fonts.font.im/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
            --bg-gradient: linear-gradient(180deg, #1C1917 0%, #1e3a5f 50%, #164E63 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(34, 211, 238, 0.3);
            --text-primary: #F8FAFC;
            --text-secondary: #CBD5E1;
            --accent-cyan: #22D3EE;
            --accent-blue: #3B82F6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-primary); 
            min-height: 100vh;
        }
        
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #06B6D4 0%, #22D3EE 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #22D3EE 0%, #67E8F9 100%);
            transform: translateY(-2px);
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(34, 211, 238, 0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        
        .nav-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #06B6D4 0%, #22D3EE 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sidebar {
            position: fixed;
            top: 80px;
            left: 20px;
            width: 300px;
            z-index: 10;
        }
        
        .main-content {
            position: relative;
            z-index: 5;
            margin-left: 340px;
            padding: 90px 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .control-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 300px;
            z-index: 10;
        }
        
        .step-card {
            padding: 15px 20px;
            border-radius: 10px;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        .step-card:hover, .step-card.active {
            background: rgba(34, 211, 238, 0.3);
            border-color: var(--accent-cyan);
            transform: translateX(5px);
        }
        
        .step-card.completed {
            opacity: 0.6;
            border-color: #22C55E;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-cyan);
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 1000;
            animation: fadeInOut 2s ease;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20%, 80% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        .water-container {
            position: relative;
            width: 120px;
            height: 200px;
            border: 3px solid rgba(34, 211, 238, 0.5);
            border-radius: 0 0 60px 60px;
            overflow: hidden;
        }
        
        .water-level {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, rgba(34, 211, 238, 0.3), rgba(34, 211, 238, 0.8));
            transition: height 0.5s ease;
        }
        
        .impurity {
            position: absolute;
            border-radius: 50%;
            background: #8B7355;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div>
            <h1 class="nav-title">水的净化 | Water Purification</h1>
            <p style="font-size: 0.75rem; color: var(--text-muted);">从自然水到纯净水</p>
        </div>
        <div class="flex gap-3">
            <button onclick="resetPurification()" class="btn-primary px-4 py-2 rounded-lg text-sm">重置</button>
            <button onclick="autoPurify()" class="btn-primary px-4 py-2 rounded-lg text-sm">自动净化</button>
        </div>
    </nav>
    
    <div id="canvas-container"></div>
    
    <aside class="sidebar glass p-6">
        <h2 style="color: var(--accent-cyan); margin-bottom: 15px;">学习目标</h2>
        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-cyan);">
                <span>了解净化水的各种方法</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-cyan);">
                <span>理解过滤的原理</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-cyan);">
                <span>区分硬水与软水</span>
            </label>
        </div>
        
        <div style="margin-top: 25px;">
            <h2 style="color: var(--accent-cyan); margin-bottom: 15px;">净化步骤</h2>
            <div class="step-card active" id="step1" onclick="showStep(1)">
                <span style="color: var(--accent-cyan);">①</span> 沉淀
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">自然沉降，除去大颗粒</p>
            </div>
            <div class="step-card" id="step2" onclick="showStep(2)">
                <span style="color: var(--accent-cyan);">②</span> 过滤
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">去除悬浮物</p>
            </div>
            <div class="step-card" id="step3" onclick="showStep(3)">
                <span style="color: var(--accent-cyan);">③</span> 吸附
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">活性炭吸附颜色和气味</p>
            </div>
            <div class="step-card" id="step4" onclick="showStep(4)">
                <span style="color: var(--accent-cyan);">④</span> 消毒
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">加氯或臭氧杀菌</p>
            </div>
            <div class="step-card" id="step5" onclick="showStep(5)">
                <span style="color: var(--accent-cyan);">⑤</span> 蒸馏
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">得到纯净水</p>
            </div>
        </div>
        
        <div style="margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px;">
            <h3 style="color: var(--accent-cyan); margin-bottom: 10px; font-size: 0.9rem;">为什么重要</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;">
                水是生命之源。了解水的净化过程，对于污水处理、海水淡化和饮用水安全都至关重要！
            </p>
        </div>
    </aside>
    
    <main class="main-content">
        <div class="glass p-8 text-center" style="max-width: 700px;">
            <h2 style="font-size: 1.8rem; color: var(--accent-cyan); margin-bottom: 15px;">水净化3D模拟</h2>
            <p style="color: var(--text-secondary); margin-bottom: 25px;">点击下方按钮逐步净化水</p>
            
            <div style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">
                <div style="text-align: center;">
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px;">原水</p>
                    <div class="water-container" id="waterRaw">
                        <div class="water-level" style="height: 80%;">
                            <div class="impurity" style="width: 8px; height: 8px; top: 20%; left: 30%;"></div>
                            <div class="impurity" style="width: 6px; height: 6px; top: 40%; left: 60%;"></div>
                            <div class="impurity" style="width: 10px; height: 10px; top: 60%; left: 25%;"></div>
                            <div class="impurity" style="width: 5px; height: 5px; top: 30%; left: 70%;"></div>
                        </div>
                    </div>
                </div>
                
                <div style="text-align: center;">
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px;">净化后</p>
                    <div class="water-container" id="waterClean">
                        <div class="water-level" id="cleanWaterLevel" style="height: 0%;"></div>
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-primary px-5 py-3 rounded-lg" onclick="doStep(1)">沉淀</button>
                <button class="btn-primary px-5 py-3 rounded-lg" onclick="doStep(2)">过滤</button>
                <button class="btn-primary px-5 py-3 rounded-lg" onclick="doStep(3)">吸附</button>
                <button class="btn-primary px-5 py-3 rounded-lg" onclick="doStep(4)">消毒</button>
                <button class="btn-primary px-5 py-3 rounded-lg" onclick="doStep(5)">蒸馏</button>
            </div>
        </div>
    </main>
    
    <div class="control-panel glass p-5">
        <h3 style="color: var(--accent-cyan); margin-bottom: 15px;">水质监测</h3>
        <div style="margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span style="color: var(--text-secondary);">浑浊度</span>
                <span id="turbidityValue" style="color: var(--accent-cyan);">高</span>
            </div>
            <div style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 5px;">
                <div id="turbidityBar" style="height: 100%; width: 100%; background: linear-gradient(90deg, #EF4444, #F59E0B); border-radius: 4px; transition: width 0.5s;"></div>
            </div>
        </div>
        <div style="margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span style="color: var(--text-secondary);">细菌数</span>
                <span id="bacteriaValue" style="color: var(--accent-cyan);">多</span>
            </div>
            <div style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 5px;">
                <div id="bacteriaBar" style="height: 100%; width: 100%; background: linear-gradient(90deg, #EF4444, #F59E0B); border-radius: 4px; transition: width 0.5s;"></div>
            </div>
        </div>
        <div>
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                <span style="color: var(--text-secondary);">纯净度</span>
                <span id="purityValue" style="color: var(--accent-cyan);">0%</span>
            </div>
            <div style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 5px;">
                <div id="purityBar" style="height: 100%; width: 0%; background: linear-gradient(90deg, #22C55E, #22D3EE); border-radius: 4px; transition: width 0.5s;"></div>
            </div>
        </div>
    </div>
    
    <script src="https://registry.npmmirror.com/three/0.134.0/files/build/three.min.js"></script>
    <script>
        let scene, camera, renderer, waterMesh, particles = [];
        let currentStep = 0;
        let turbidity = 100;
        let bacteria = 100;
        let purity = 0;
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);
            
            createScene();
            animate();
            
            window.addEventListener('resize', onWindowResize);
        }
        
        function createScene() {
            // 水杯
            const cupGeom = new THREE.CylinderGeometry(2, 2.2, 5, 32, 1, true);
            const cupMat = new THREE.MeshPhongMaterial({ 
                color: 0x88CCFF, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide 
            });
            const cup = new THREE.Mesh(cupGeom, cupMat);
            cup.position.y = 0;
            scene.add(cup);
            
            // 水
            const waterGeom = new THREE.CylinderGeometry(1.9, 1.9, 3, 32);
            const waterMat = new THREE.MeshPhongMaterial({ 
                color: 0x3B82F6, 
                transparent: true, 
                opacity: 0.6 
            });
            waterMesh = new THREE.Mesh(waterGeom, waterMat);
            waterMesh.position.y = -0.5;
            scene.add(waterMesh);
            
            // 杂质粒子
            for (let i = 0; i < 30; i++) {
                const impGeom = new THREE.SphereGeometry(0.05 + Math.random() * 0.1, 8, 8);
                const impMat = new THREE.MeshBasicMaterial({ 
                    color: new THREE.Color().setHSL(0.1, 0.5, 0.3 + Math.random() * 0.2) 
                });
                const imp = new THREE.Mesh(impGeom, impMat);
                imp.position.set(
                    (Math.random() - 0.5) * 3,
                    -1 + Math.random() * 2,
                    (Math.random() - 0.5) * 3
                );
                imp.userData = { originalY: imp.position.y, speed: Math.random() * 0.5 + 0.5 };
                scene.add(imp);
                particles.push(imp);
            }
        }
        
        function doStep(step) {
            if (step <= currentStep) return;
            
            const steps = {
                1: { name: '沉淀', effect: () => { particles.forEach(p => p.material.opacity = 0.7); } },
                2: { name: '过滤', effect: () => { particles.forEach(p => { p.visible = false; }); } },
                3: { name: '吸附', effect: () => { waterMesh.material.color.setHex(0x22D3EE); } },
                4: { name: '消毒', effect: () => { waterMesh.material.color.setHex(0x67E8F9); } },
                5: { name: '蒸馏', effect: () => { waterMesh.material.color.setHex(0xFFFFFF); waterMesh.material.opacity = 0.9; } }
            };
            
            steps[step].effect();
            
            // Update UI
            document.getElementById(`step${step}`).classList.remove('active');
            document.getElementById(`step${step}`).classList.add('completed');
            if (step < 5) document.getElementById(`step${step + 1}`).classList.add('active');
            
            // Update water display
            document.getElementById('cleanWaterLevel').style.height = (step * 20) + '%';
            
            // Update stats
            const stats = {
                1: { turbidity: 70, bacteria: 100, purity: 20 },
                2: { turbidity: 30, bacteria: 100, purity: 50 },
                3: { turbidity: 10, bacteria: 100, purity: 70 },
                4: { turbidity: 5, bacteria: 20, purity: 90 },
                5: { turbidity: 0, bacteria: 0, purity: 100 }
            };
            
            const s = stats[step];
            updateStats(s.turbidity, s.bacteria, s.purity);
            
            currentStep = step;
            showToast(`${steps[step].name}完成！`);
        }
        
        function updateStats(t, b, p) {
            turbidity = t;
            bacteria = b;
            purity = p;
            
            document.getElementById('turbidityBar').style.width = t + '%';
            document.getElementById('bacteriaBar').style.width = b + '%';
            document.getElementById('purityBar').style.width = p + '%';
            
            document.getElementById('turbidityValue').textContent = t > 60 ? '高' : t > 30 ? '中' : t > 0 ? '低' : '无';
            document.getElementById('bacteriaValue').textContent = b > 60 ? '多' : b > 30 ? '中' : b > 0 ? '少' : '无';
            document.getElementById('purityValue').textContent = p + '%';
        }
        
        function showStep(step) {
            showToast(`步骤${step}: ${['沉淀', '过滤', '吸附', '消毒', '蒸馏'][step - 1]}`);
        }
        
        function resetPurification() {
            currentStep = 0;
            particles.forEach(p => { p.visible = true; p.material.opacity = 1; });
            waterMesh.material.color.setHex(0x3B82F6);
            waterMesh.material.opacity = 0.6;
            
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`step${i}`);
                el.classList.remove('completed', 'active');
                if (i === 1) el.classList.add('active');
            }
            
            document.getElementById('cleanWaterLevel').style.height = '0%';
            updateStats(100, 100, 0);
            showToast('已重置');
        }
        
        function autoPurify() {
            resetPurification();
            let step = 1;
            const interval = setInterval(() => {
                if (step <= 5) {
                    doStep(step);
                    step++;
                } else {
                    clearInterval(interval);
                    showToast('自动净化完成！');
                }
            }, 800);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            particles.forEach(p => {
                if (p.visible && currentStep < 2) {
                    p.position.y = p.userData.originalY + Math.sin(time * p.userData.speed) * 0.2;
                }
            });
            
            waterMesh.rotation.y = time * 0.2;
            
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
