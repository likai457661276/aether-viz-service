<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碳的同素异形体 | Carbon Allotropes</title>
    <script src="https://registry.npmmirror.com/@tailwindcss/browser/4.3.0/files/dist/index.global.js"></script>
    <style>
        @import url('https://fonts.font.im/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary-gradient: linear-gradient(135deg, #374151 0%, #1F2937 100%);
            --bg-gradient: linear-gradient(180deg, #1C1917 0%, #1F2937 50%, #374151 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(251, 191, 36, 0.3);
            --text-primary: #F8FAFC;
            --text-secondary: #D1D5DB;
            --accent-gold: #FBBF24;
            --accent-diamond: #60A5FA;
            --accent-graphite: #6B7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-primary); 
            min-height: 100vh;
        }
        
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #374151 0%, #1F2937 100%);
            border: 1px solid var(--accent-gold);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4B5563 0%, #374151 100%);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        
        .nav-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FBBF24 0%, #D97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sidebar {
            position: fixed;
            top: 80px;
            left: 20px;
            width: 300px;
            z-index: 10;
        }
        
        .main-content {
            position: relative;
            z-index: 5;
            margin-left: 340px;
            padding: 90px 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .allotrope-btn {
            padding: 15px 25px;
            border-radius: 12px;
            background: rgba(251, 191, 36, 0.1);
            border: 2px solid rgba(251, 191, 36, 0.3);
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-primary);
        }
        
        .allotrope-btn:hover, .allotrope-btn.active {
            background: rgba(251, 191, 36, 0.3);
            border-color: var(--accent-gold);
            transform: scale(1.05);
        }
        
        .property-card {
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-gold);
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 1000;
            animation: fadeInOut 2s ease;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div>
            <h1 class="nav-title">碳的同素异形体 | Carbon Allotropes</h1>
            <p style="font-size: 0.75rem; color: var(--text-muted);">金刚石、石墨、C60</p>
        </div>
        <div class="flex gap-3">
            <button onclick="resetView()" class="btn-primary px-4 py-2 rounded-lg text-sm">重置</button>
            <button onclick="rotateSpeed()" class="btn-primary px-4 py-2 rounded-lg text-sm">旋转速度</button>
        </div>
    </nav>
    
    <div id="canvas-container"></div>
    
    <aside class="sidebar glass p-6">
        <h2 style="color: var(--accent-gold); margin-bottom: 15px;">学习目标</h2>
        <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.9rem;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-gold);">
                <span>认识碳的三种同素异形体</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-gold);">
                <span>了解它们的结构差异</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" style="accent-color: var(--accent-gold);">
                <span>理解结构与性质的关系</span>
            </label>
        </div>
        
        <div style="margin-top: 25px;">
            <h2 style="color: var(--accent-gold); margin-bottom: 15px;" id="allotropeTitle">金刚石</h2>
            <div id="allotropeInfo">
                <div class="property-card">
                    <p style="color: var(--text-muted); font-size: 0.75rem;">外观</p>
                    <p style="color: var(--text-secondary);">无色透明晶体</p>
                </div>
                <div class="property-card">
                    <p style="color: var(--text-muted); font-size: 0.75rem;">硬度</p>
                    <p style="color: var(--text-secondary);">自然界最硬</p>
                </div>
                <div class="property-card">
                    <p style="color: var(--text-muted); font-size: 0.75rem;">导电性</p>
                    <p style="color: var(--text-secondary);">不导电</p>
                </div>
                <div class="property-card">
                    <p style="color: var(--text-muted); font-size: 0.75rem;">用途</p>
                    <p style="color: var(--text-secondary);">钻头、饰品、切割</p>
                </div>
            </div>
        </div>
        
        <div style="margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px;">
            <h3 style="color: var(--accent-gold); margin-bottom: 10px; font-size: 0.9rem;">结构决定性质</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.6;">
                同一种元素形成的不同单质，叫做同素异形体。<br><br>
                碳的同素异形体由于原子排列方式不同，导致物理性质差异巨大。
            </p>
        </div>
    </aside>
    
    <main class="main-content">
        <div class="glass p-8 text-center" style="max-width: 700px;">
            <h2 style="font-size: 1.8rem; color: var(--accent-gold); margin-bottom: 15px;">碳的同素异形体 3D 结构</h2>
            <p style="color: var(--text-secondary); margin-bottom: 25px;">点击下方按钮查看不同的碳同素异形体</p>
            
            <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px;">
                <button class="allotrope-btn active" onclick="showAllotrope('diamond')" id="btnDiamond">
                    💎 金刚石
                </button>
                <button class="allotrope-btn" onclick="showAllotrope('graphite')" id="btnGraphite">
                    ⬛ 石墨
                </button>
                <button class="allotrope-btn" onclick="showAllotrope('buckyball')" id="btnBuckyball">
                    ⚽ C60
                </button>
            </div>
            
            <div id="structureDesc" style="padding: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 20px;">
                <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.8;">
                    金刚石中每个碳原子与4个相邻碳原子形成<span style="color: var(--accent-gold);">正四面体</span>结构，<br>
                    这种空间网状结构使其成为最硬的天然物质。
                </p>
            </div>
            
            <div style="padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px;">
                <p style="color: var(--accent-gold); font-size: 1.1rem;">化学式</p>
                <p style="color: var(--text-primary); font-size: 1.5rem; margin-top: 5px;" id="formulaDisplay">C</p>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">所有同素异形体都由碳原子组成</p>
            </div>
        </div>
    </main>
    
    <script src="https://registry.npmmirror.com/three/0.134.0/files/build/three.min.js"></script>
    <script>
        let scene, camera, renderer, structureGroup;
        let currentAllotrope = 'diamond';
        let rotationSpeed = 1;
        
        const allotropeData = {
            diamond: {
                title: '金刚石',
                color: 0x60A5FA,
                description: '金刚石中每个碳原子与4个相邻碳原子形成正四面体结构，这种空间网状结构使其成为最硬的天然物质。',
                properties: ['无色透明', '硬度最高', '不导电', '折射率高']
            },
            graphite: {
                title: '石墨',
                color: 0x6B7280,
                description: '石墨中碳原子呈层状排列，每层内碳原子以六边形方式连接，层间作用力弱，易滑动。',
                properties: ['深灰色', '质软滑腻', '导电性好', '耐高温']
            },
            buckyball: {
                title: 'C60 富勒烯',
                color: 0xF59E0B,
                description: 'C60由60个碳原子组成，形似足球，由12个五边形和20个六边形构成。',
                properties: ['黑灰色固体', '中空分子', '半导体特性', '应用于材料科学']
            }
        };
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);
            
            structureGroup = new THREE.Group();
            scene.add(structureGroup);
            
            createDiamondStructure();
            animate();
            
            window.addEventListener('resize', onWindowResize);
        }
        
        function createDiamondStructure() {
            clearStructure();
            
            const color = allotropeData.diamond.color;
            const atomGeom = new THREE.SphereGeometry(0.3, 16, 16);
            const atomMat = new THREE.MeshPhongMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 0.3,
                shininess: 100 
            });
            
            // 金刚石结构 - 正四面体
            const positions = [];
            const center = new THREE.Vector3(0, 0, 0);
            const vertices = [
                new THREE.Vector3(1, 1, 1),
                new THREE.Vector3(1, -1, -1),
                new THREE.Vector3(-1, 1, -1),
                new THREE.Vector3(-1, -1, 1)
            ];
            
            // 中心原子
            const centerAtom = new THREE.Mesh(atomGeom, atomMat);
            structureGroup.add(centerAtom);
            
            // 四个方向的原子
            vertices.forEach(v => {
                const atom = new THREE.Mesh(atomGeom, atomMat);
                atom.position.copy(v.clone().multiplyScalar(1.5));
                structureGroup.add(atom);
                
                // 添加键
                const bondGeom = new THREE.CylinderGeometry(0.05, 0.05, 1.3, 8);
                const bondMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
                const bond = new THREE.Mesh(bondGeom, bondMat);
                
                bond.position.copy(v.clone().multiplyScalar(0.75));
                bond.lookAt(center);
                bond.rotateX(Math.PI / 2);
                structureGroup.add(bond);
            });
            
            // 添加更多原子展示网络
            const offsets = [
                [3, 0, 0], [-3, 0, 0], [0, 3, 0], [0, -3, 0], [0, 0, 3], [0, 0, -3]
            ];
            offsets.forEach(offset => {
                const atom = new THREE.Mesh(atomGeom, atomMat);
                atom.position.set(...offset);
                structureGroup.add(atom);
            });
        }
        
        function createGraphiteStructure() {
            clearStructure();
            
            const color = allotropeData.graphite.color;
            const atomGeom = new THREE.SphereGeometry(0.3, 16, 16);
            const atomMat = new THREE.MeshPhongMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 0.2 
            });
            
            // 石墨层状结构
            for (let layer = -1; layer <= 1; layer++) {
                const layerGroup = new THREE.Group();
                layerGroup.position.y = layer * 1.5;
                
                // 六边形层
                const hexPositions = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    hexPositions.push(new THREE.Vector3(Math.cos(angle) * 1.5, 0, Math.sin(angle) * 1.5));
                }
                
                hexPositions.forEach(pos => {
                    const atom = new THREE.Mesh(atomGeom, atomMat);
                    atom.position.copy(pos);
                    layerGroup.add(atom);
                });
                
                // 中心原子
                const centerAtom = new THREE.Mesh(atomGeom, atomMat);
                layerGroup.add(centerAtom);
                
                // 层内键
                hexPositions.forEach(pos => {
                    const bondGeom = new THREE.CylinderGeometry(0.04, 0.04, 1.3, 8);
                    const bondMat = new THREE.MeshBasicMaterial({ color: 0x666666 });
                    const bond = new THREE.Mesh(bondGeom, bondMat);
                    bond.position.copy(pos.clone().multiplyScalar(0.5));
                    bond.lookAt(centerAtom.position);
                    bond.rotateX(Math.PI / 2);
                    layerGroup.add(bond);
                });
                
                structureGroup.add(layerGroup);
            }
            
            // 层间键（弱）
            const layerBondGeom = new THREE.CylinderGeometry(0.02, 0.02, 1.3, 8);
            const layerBondMat = new THREE.MeshBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.5 });
            [-1, 0, 1].forEach((y, i) => {
                if (i < 2) {
                    const bond = new THREE.Mesh(layerBondGeom, layerBondMat);
                    bond.position.y = y * 1.5 + 0.75;
                    structureGroup.add(bond);
                }
            });
        }
        
        function createBuckyballStructure() {
            clearStructure();
            
            const color = allotropeData.buckyball.color;
            const atomGeom = new THREE.SphereGeometry(0.25, 16, 16);
            const atomMat = new THREE.MeshPhongMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 0.4,
                shininess: 80
            });
            
            // C60足球烯 - 简化模型
            const radius = 3;
            
            // 五边形顶点
            for (let i = 0; i < 12; i++) {
                const phi = Math.acos(-1 + (2 * i) / 12);
                const theta = Math.sqrt(12 * Math.PI) * phi;
                
                const x = radius * Math.cos(theta) * Math.sin(phi);
                const y = radius * Math.sin(theta) * Math.sin(phi);
                const z = radius * Math.cos(phi);
                
                const atom = new THREE.Mesh(atomGeom, atomMat);
                atom.position.set(x, y, z);
                structureGroup.add(atom);
            }
            
            // 六边形顶点
            for (let i = 0; i < 20; i++) {
                const phi = Math.acos(-1 + (2 * (i + 12)) / 32);
                const theta = Math.sqrt(12 * Math.PI) * phi + Math.PI / 5;
                
                const x = radius * Math.cos(theta) * Math.sin(phi);
                const y = radius * Math.sin(theta) * Math.sin(phi);
                const z = radius * Math.cos(phi);
                
                const atom = new THREE.Mesh(atomGeom, atomMat);
                atom.position.set(x, y, z);
                structureGroup.add(atom);
            }
            
            // 简化：只显示部分键
            const bondMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
            for (let i = 0; i < structureGroup.children.length; i += 2) {
                if (i + 1 < structureGroup.children.length) {
                    const start = structureGroup.children[i].position;
                    const end = structureGroup.children[i + 1].position;
                    
                    const bondGeom = new THREE.CylinderGeometry(0.03, 0.03, start.distanceTo(end), 8);
                    const bond = new THREE.Mesh(bondGeom, bondMat);
                    bond.position.copy(start.clone().add(end).multiplyScalar(0.5));
                    bond.lookAt(start);
                    bond.rotateX(Math.PI / 2);
                    structureGroup.add(bond);
                }
            }
        }
        
        function clearStructure() {
            while (structureGroup.children.length > 0) {
                const obj = structureGroup.children[0];
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
                structureGroup.remove(obj);
            }
        }
        
        function showAllotrope(type) {
            currentAllotrope = type;
            
            document.querySelectorAll('.allotrope-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
            
            const data = allotropeData[type];
            document.getElementById('allotropeTitle').textContent = data.title;
            
            let propsHtml = '';
            data.properties.forEach(p => {
                propsHtml += `<div class="property-card"><p style="color: var(--text-muted); font-size: 0.75rem;">${p}</p></div>`;
            });
            document.getElementById('allotropeInfo').innerHTML = propsHtml;
            
            document.getElementById('structureDesc').innerHTML = `<p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.8;">${data.description}</p>`;
            
            document.getElementById('formulaDisplay').textContent = type === 'buckyball' ? 'C₆₀' : 'C';
            
            if (type === 'diamond') createDiamondStructure();
            else if (type === 'graphite') createGraphiteStructure();
            else if (type === 'buckyball') createBuckyballStructure();
            
            showToast(`查看: ${data.title}`);
        }
        
        function resetView() {
            camera.position.set(0, 5, 10);
            rotationSpeed = 1;
            showToast('视图已重置');
        }
        
        function rotateSpeed() {
            rotationSpeed = rotationSpeed === 1 ? 3 : 1;
            showToast(`旋转速度: ${rotationSpeed === 1 ? '正常' : '快速'}`);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            structureGroup.rotation.y += 0.005 * rotationSpeed;
            structureGroup.rotation.x += 0.002 * rotationSpeed;
            
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
